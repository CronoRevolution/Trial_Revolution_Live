<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="theme-color" id="themeColor" content="#1a1f35">
<title>Trial Revolution — Clasificación</title>
<style>
:root{
  --bg:#f0f2f5;--sf:#fff;--sf2:#e8ecf2;--bd:#d1d9e6;
  --tx:#0a0f1e;--mu:#64748b;--hbg:#1a1f35;
  --ac:#c47c00;--acl:#f59e0b;
  --ok:#15803d;--dg:#b91c1c;--wn:#a16207;
  --c1:#b91c1c;--c2:#1d4ed8;--c3:#15803d;--c4:#a16207;--c5:#c2410c;--c5a:#374151;
  --sh:rgba(0,0,0,.07);
  --s0:#15803d;--s1:#1d4ed8;--s2:#a16207;--s3:#b91c1c;--s5:#7e22ce;
}
[data-theme=dark]{
  --bg:#080b12;--sf:#111826;--sf2:#1a2236;--bd:#232d42;
  --tx:#e2e8f0;--mu:#64748b;--hbg:#060810;
  --ac:#f59e0b;--acl:#fbbf24;--ok:#22c55e;--dg:#ef4444;
  --sh:rgba(0,0,0,.4);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{min-height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:var(--bg);color:var(--tx);transition:background .2s,color .2s;}

/* HEADER */
.hdr{background:var(--hbg);padding:10px 14px;display:flex;align-items:center;gap:10px;
  position:sticky;top:0;z-index:100;box-shadow:0 2px 10px var(--sh);}
.hbk{background:rgba(255,255,255,.1);border:none;border-radius:8px;padding:6px 10px;
  color:#e2e8f0;font-size:16px;cursor:pointer;}
.htitle{flex:1;font-weight:800;font-size:16px;color:#f59e0b;line-height:1.2;min-width:0;}
.htitle small{display:block;font-size:9px;font-weight:400;color:#94a3b8;letter-spacing:2px;
  text-transform:uppercase;margin-top:2px;}
.hright{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.ibtn{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:8px;
  padding:5px 9px;color:#e2e8f0;font-size:14px;cursor:pointer;}
.blive{display:inline-flex;align-items:center;gap:5px;background:rgba(185,28,28,.2);
  border:1px solid rgba(185,28,28,.5);border-radius:20px;padding:3px 9px;font-size:9px;
  font-weight:800;letter-spacing:1.5px;color:#fca5a5;text-transform:uppercase;}
.bpre{display:inline-flex;align-items:center;gap:5px;background:rgba(100,116,139,.15);
  border:1px solid rgba(100,116,139,.3);border-radius:20px;padding:3px 9px;font-size:9px;
  font-weight:700;letter-spacing:1.5px;color:#94a3b8;text-transform:uppercase;}
.ldot{width:6px;height:6px;border-radius:50%;background:#ef4444;animation:blink 1s step-end infinite;}
@keyframes blink{50%{opacity:0;}}
.clk{font-family:monospace;font-size:14px;font-weight:700;color:#f59e0b;}

/* TICKER */
.ticker{background:var(--hbg);border-bottom:2px solid var(--ac);height:24px;display:none;align-items:center;overflow:hidden;}
.tklbl{background:var(--ac);color:#000;padding:0 10px;height:100%;display:flex;align-items:center;
  font-size:10px;font-weight:800;letter-spacing:2px;flex-shrink:0;}
.tktxt{white-space:nowrap;animation:tick 50s linear infinite;padding-left:20px;
  font-size:10px;color:#94a3b8;font-weight:700;}
@keyframes tick{from{transform:translateX(0);}to{transform:translateX(-50%);}}

/* VIEWS */
.view{display:none;}.view.active{display:block;}

/* WAITING */
#vWait{display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:70vh;gap:16px;padding:40px 20px;text-align:center;}
.wlogo{font-weight:900;font-size:52px;letter-spacing:5px;color:#f59e0b;line-height:1;}
.wsub{font-size:12px;color:var(--mu);letter-spacing:3px;text-transform:uppercase;}
.wdots{display:flex;gap:8px;margin-top:6px;}
.wdot{width:8px;height:8px;border-radius:50%;background:var(--mu);
  animation:dp 1.2s ease-in-out infinite;}
.wdot:nth-child(2){animation-delay:.2s;}.wdot:nth-child(3){animation-delay:.4s;}
@keyframes dp{0%,80%,100%{opacity:.3;}40%{opacity:1;}}

/* HOME */
.hero{background:var(--hbg);padding:24px 16px 20px;text-align:center;}
.hero-race{font-size:22px;font-weight:900;color:#f59e0b;letter-spacing:1px;line-height:1.2;}
.hero-sub{font-size:11px;color:#94a3b8;margin-top:4px;letter-spacing:1px;}
.hero-date{font-size:13px;color:#cbd5e1;margin-top:8px;font-weight:600;}
.hero-org{font-size:11px;color:#94a3b8;margin-top:2px;}
.hero-stats{display:flex;justify-content:center;gap:24px;margin-top:14px;}
.hstat .v{font-size:28px;font-weight:900;color:#f59e0b;}
.hstat .l{font-size:9px;color:#94a3b8;text-transform:uppercase;letter-spacing:1.5px;}
.upd{text-align:center;font-size:10px;color:var(--mu);padding:6px 0;letter-spacing:.5px;}
.catgrid{padding:12px;display:flex;flex-direction:column;gap:10px;}
.ctile{background:var(--sf);border-radius:14px;box-shadow:0 2px 8px var(--sh);
  display:flex;align-items:center;overflow:hidden;cursor:pointer;
  transition:transform .1s;border:2px solid transparent;}
.ctile:active{transform:scale(.98);}
.ctbar{width:6px;align-self:stretch;flex-shrink:0;}
.ctbody{flex:1;padding:14px;}
.ctname{font-size:22px;font-weight:900;letter-spacing:3px;}
.ctldr{font-size:13px;font-weight:700;color:var(--tx);margin-top:2px;}
.ctmeta{font-size:11px;color:var(--mu);margin-top:2px;}
.ctcount{padding:0 16px;text-align:center;flex-shrink:0;}
.ctnum{font-size:32px;font-weight:900;}
.ctclbl{font-size:9px;color:var(--mu);text-transform:uppercase;letter-spacing:1px;}
.ctarrow{font-size:18px;color:var(--mu);padding-right:14px;}

/* CAT VIEW */
.catstrip{padding:12px 14px 10px;border-bottom:3px solid transparent;}
.catname{font-size:28px;font-weight:900;letter-spacing:4px;}
.catmeta{font-size:12px;color:var(--mu);margin-top:2px;}
.plist{display:flex;flex-direction:column;}
.prow{background:var(--sf);border-bottom:1px solid var(--bd);display:flex;
  align-items:center;gap:10px;padding:11px 14px;cursor:pointer;transition:background .1s;}
.prow:active{background:var(--sf2);}
.ppos{font-size:19px;font-weight:900;width:30px;text-align:center;flex-shrink:0;}
.pdors{font-size:17px;font-weight:900;width:30px;text-align:center;flex-shrink:0;color:var(--ac);}
.pinfo{flex:1;min-width:0;}
.pname{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.psub{font-size:11px;color:var(--mu);margin-top:1px;}
.pright{text-align:right;flex-shrink:0;}
.ppts{font-size:18px;font-weight:900;font-family:monospace;}
.pplbl{font-size:9px;color:var(--mu);text-transform:uppercase;letter-spacing:.5px;}
.pbdg{display:inline-block;padding:2px 8px;border-radius:5px;font-size:10px;
  font-weight:800;letter-spacing:.5px;border:1.5px solid;margin-top:3px;}
.bv1{background:rgba(29,78,216,.1);color:#1d4ed8;border-color:#93c5fd;}
.bv2{background:rgba(161,98,7,.1);color:#a16207;border-color:#fcd34d;}
.bv3{background:rgba(126,34,206,.1);color:#7e22ce;border-color:#d8b4fe;}
.bfin{background:rgba(21,128,61,.1);color:#15803d;border-color:#86efac;}
.br{background:rgba(185,28,28,.1);color:#b91c1c;border-color:#fca5a5;}
.bdq{background:rgba(194,65,12,.1);color:#c2410c;border-color:#fdba74;}

/* PILOT DETAIL */
.pdhero{background:var(--hbg);padding:14px 16px;}
.pdname{font-size:18px;font-weight:900;color:#f1f5f9;line-height:1.2;}
.pdmeta{font-size:11px;color:#94a3b8;margin-top:3px;}
.pdtotals{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;}
.pdchip{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);
  border-radius:10px;padding:8px 12px;text-align:center;flex:1;min-width:70px;}
.pdchip .cv{font-size:20px;font-weight:900;font-family:monospace;color:#f59e0b;}
.pdchip .cl{font-size:9px;color:#94a3b8;text-transform:uppercase;letter-spacing:1px;margin-top:2px;}

.pdsec{padding:12px 14px 0;}
.pdstitle{font-size:11px;font-weight:800;letter-spacing:2px;text-transform:uppercase;
  color:var(--mu);margin-bottom:8px;}

.scbar{display:flex;gap:6px;flex-wrap:wrap;padding:0 14px 10px;}
.scchip{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:8px;
  font-size:13px;font-weight:800;font-family:monospace;}

.lapcard{background:var(--sf);border-radius:12px;box-shadow:0 1px 6px var(--sh);
  margin:0 12px 10px;overflow:hidden;}
.laphead{display:flex;align-items:center;justify-content:space-between;
  padding:8px 14px;background:var(--sf2);border-bottom:1px solid var(--bd);}
.laptitle{font-weight:800;font-size:13px;letter-spacing:1px;}
.lappts{font-family:monospace;font-size:16px;font-weight:900;color:var(--ac);}

.zgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;padding:10px 12px;}
.zcell{text-align:center;}
.zlbl{font-size:9px;color:var(--mu);margin-bottom:3px;text-transform:uppercase;letter-spacing:.5px;}
.zval{font-size:17px;font-weight:900;font-family:monospace;width:34px;height:34px;
  border-radius:8px;display:inline-flex;align-items:center;justify-content:center;border:1.5px solid;}
.z0{color:var(--s0);background:rgba(21,128,61,.1);border-color:rgba(21,128,61,.3);}
.z1{color:var(--s1);background:rgba(29,78,216,.1);border-color:rgba(29,78,216,.3);}
.z2{color:var(--s2);background:rgba(161,98,7,.1);border-color:rgba(161,98,7,.3);}
.z3{color:var(--s3);background:rgba(185,28,28,.1);border-color:rgba(185,28,28,.3);}
.z5{color:var(--s5);background:rgba(126,34,206,.1);border-color:rgba(126,34,206,.3);}
.zn{color:var(--mu);background:var(--sf2);border-color:var(--bd);}

.timegrid{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:0 12px 10px;}
.tchip{background:var(--sf2);border-radius:8px;padding:8px 10px;}
.tchip .tl{font-size:9px;color:var(--mu);text-transform:uppercase;letter-spacing:.5px;}
.tchip .tv{font-size:14px;font-weight:800;font-family:monospace;margin-top:2px;}
.tv.tok{color:var(--ok);}.tv.twn{color:var(--dg);}

.penlist{padding:0 12px 10px;display:flex;flex-direction:column;gap:6px;}
.penitem{background:rgba(185,28,28,.08);border:1px solid rgba(185,28,28,.2);
  border-radius:8px;padding:8px 12px;display:flex;align-items:center;gap:10px;}
.penpts{font-size:15px;font-weight:900;font-family:monospace;color:var(--dg);flex-shrink:0;}
.penrsn{font-size:12px;color:var(--tx);flex:1;}
.pents{font-size:10px;color:var(--mu);}

footer{text-align:center;padding:20px 16px 30px;font-size:10px;color:var(--mu);
  letter-spacing:.5px;border-top:1px solid var(--bd);margin-top:8px;}
</style>
</head>
<body>

<header class="hdr" id="hdr">
  <button class="hbk ibtn" id="btnBack" onclick="goBack()" style="display:none">‹</button><button class="hbk ibtn" id="btnHome" onclick="goHome()" style="display:none">⌂</button>
  <div class="htitle" id="hTitle">Trial Revolution <small>Clasificación en directo</small></div>
  <div class="hright">
    <span class="bpre" id="sBadge">En espera</span>
    <div class="clk" id="clk">--:--:--</div>
    <button class="ibtn" onclick="toggleTheme()" id="themeBtn">🌙</button>
  </div>
</header>

<div class="ticker" id="ticker">
  <div class="tklbl">LIVE</div>
  <div class="tktxt" id="tkTxt"></div>
</div>

<!-- WAITING -->
<div id="vWait">
  <div class="wlogo">Trial<br>Revolution</div>
  <div class="wsub">Clasificación en directo</div>
  <div class="wdots"><div class="wdot"></div><div class="wdot"></div><div class="wdot"></div></div>
  <div style="font-size:11px;color:var(--mu);margin-top:4px">Actualizando cada 30 s…</div>
</div>

<!-- HOME -->
<div class="view" id="vHome">
  <div class="hero">
    <div class="hero-race" id="hRace">Trial Revolution</div>
    <div class="hero-sub">Campeonato de Trial de Castilla y León 2026</div>
    <div class="hero-date" id="hDate"></div>
    <div class="hero-org" id="hOrg"></div>
    <div class="hero-stats">
      <div class="hstat"><div class="v" id="hPilots">—</div><div class="l">Pilotos</div></div>
      <div class="hstat"><div class="v" id="hCats">—</div><div class="l">Categorías</div></div>
      <div class="hstat"><div class="v" id="hFin">—</div><div class="l">Finalizados</div></div>
    </div>
  </div>
  <div class="upd" id="hUpd"></div>
  <div class="catgrid" id="catGrid"></div>
  <footer id="footerTxt">Trial Revolution · Actualización automática cada 30 s</footer>
</div>

<!-- CAT -->
<div class="view" id="vCat">
  <div class="catstrip" id="catStrip">
    <div class="catname" id="catNm"></div>
    <div class="catmeta" id="catMt"></div>
  </div>
  <div class="plist" id="pList"></div>
  <div style="height:20px"></div>
</div>

<!-- PILOT -->
<div class="view" id="vPilot">
  <div class="pdhero">
    <div class="pdname" id="pdNm"></div>
    <div class="pdmeta" id="pdMt"></div>
    <div class="pdtotals" id="pdTot"></div>
  </div>
  <div id="pdBody"></div>
  <div style="height:24px"></div>
</div>

<script>
const CAT_ORDER  = ['TR1','TR2','TR3','TR4','TR5','TR5A'];
const CAT_COLORS = {TR1:'#b91c1c',TR2:'#1d4ed8',TR3:'#15803d',TR4:'#a16207',TR5:'#c2410c',TR5A:'#374151'};
const DATA_URL = 'data.json';
const POLL_MS  = 30000;

let _data = null;
let _selCat = null, _selPilot = null;

// ── THEME ─────────────────────────────────────────────────────
let theme = localStorage.getItem('tr_theme') ||
  (window.matchMedia('(prefers-color-scheme:dark)').matches ? 'dark' : 'light');
function applyTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  document.getElementById('themeBtn').textContent = t==='dark'?'☀️':'🌙';
  document.getElementById('themeColor').content = t==='dark'?'#060810':'#1a1f35';
  localStorage.setItem('tr_theme', t);
}
function toggleTheme() { theme = theme==='dark'?'light':'dark'; applyTheme(theme); }
applyTheme(theme);

// ── CLOCK ─────────────────────────────────────────────────────
function pad(n){return String(n).padStart(2,'0');}
setInterval(()=>{
  const n=new Date();
  document.getElementById('clk').textContent=pad(n.getHours())+':'+pad(n.getMinutes())+':'+pad(n.getSeconds());
},500);

// ── HELPERS ───────────────────────────────────────────────────
function shortName(name){
  const p=name.split(',');
  return p.length<2?name:p[1].trim().split(' ')[0]+' '+p[0].trim();
}
function cnt(p,v){let n=0;for(let l=0;l<3;l++)for(let z=0;z<7;z++)if(p.scores[l]&&p.scores[l][z]===v)n++;return n;}
function lapPts(p,l){
  const s=p.scores[l];if(!s||s.every(v=>v===null))return null;
  return s.reduce((a,v)=>a+(v===null?0:v),0);
}
function getTotal(p){
  // Use pre-calculated totalPoints if available
  if(p.totalPoints!==null&&p.totalPoints!==undefined) return p.totalPoints;
  let t=0,any=false;
  for(let l=0;l<3;l++){const lp=lapPts(p,l);if(lp!==null){t+=lp;any=true;}}
  if(!any)return null;
  const ep=(p.extraPenalties||[]).reduce((s,x)=>s+(x.pts||0),0);
  return t+(p.lap1Penalty||0)+(p.finishPenalty||0)+ep;
}
function zoneClass(v){
  if(v===null||v===undefined)return 'zn';
  return{0:'z0',1:'z1',2:'z2',3:'z3',5:'z5'}[v]||'zn';
}
function lapBadge(p){
  if(p.dsq)return '<span class="pbdg bdq">DQ</span>';
  if(p.dnf)return '<span class="pbdg br">R</span>';
  if(p.totalTime)return '<span class="pbdg bfin">✓ FIN</span>';
  const l2=lapPts(p,1),l3=lapPts(p,2);
  if(l3!==null)return '<span class="pbdg bv3">V3</span>';
  if(l2!==null||p.lap1Time)return '<span class="pbdg bv2">V2</span>';
  return '<span class="pbdg bv1">V1</span>';
}
function sortPilots(arr){
  return arr.slice().sort((a,b)=>{
    if((a.dnf||a.dsq)&&!(b.dnf||b.dsq))return 1;
    if(!(a.dnf||a.dsq)&&(b.dnf||b.dsq))return-1;
    const pa=getTotal(a)??9999,pb=getTotal(b)??9999;
    if(pa!==pb)return pa-pb;
    if(cnt(b,0)!==cnt(a,0))return cnt(b,0)-cnt(a,0);
    return cnt(b,1)-cnt(a,1);
  });
}

// ── NAVIGATION WITH HISTORY API ───────────────────────────────
const _histOk = (() => { try { history.replaceState(null,'',location.href); return true; } catch(e) { return false; } })();

function navigate(view, pushState=true) {
  // Hide all
  document.getElementById('vWait').style.display='none';
  ['vHome','vCat','vPilot'].forEach(id=>{
    const el=document.getElementById(id);
    el.style.display='';
    el.classList.remove('active');
  });

  const backBtn=document.getElementById('btnBack');
  const homeBtn=document.getElementById('btnHome');
  if(view==='home'){
    document.getElementById('vHome').classList.add('active');
    backBtn.style.display='none'; if(homeBtn) homeBtn.style.display='none';
    document.getElementById('hTitle').innerHTML='Trial Revolution <small>Clasificación en directo</small>';
    if(pushState && _histOk) try { history.pushState({view:'home'},'','#home'); } catch(e) {}
  } else if(view==='cat'){
    document.getElementById('vCat').classList.add('active');
    backBtn.style.display=''; if(homeBtn) homeBtn.style.display='';
    const col=CAT_COLORS[_selCat]||'#888';
    document.getElementById('hTitle').innerHTML=`<span style="color:${col};font-size:20px;letter-spacing:3px">${_selCat}</span>`;
    if(pushState && _histOk) try { history.pushState({view:'cat',cat:_selCat},'','#cat-'+_selCat); } catch(e) {}
  } else if(view==='pilot'){
    document.getElementById('vPilot').classList.add('active');
    backBtn.style.display=''; if(homeBtn) homeBtn.style.display='';
    document.getElementById('hTitle').innerHTML=
      `<span style="font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${_selPilot.name}</span>`;
    if(pushState && _histOk) try { history.pushState({view:'pilot',cat:_selCat,dorsal:_selPilot.dorsal},'','#pilot-'+_selPilot.dorsal); } catch(e) {}
  }
  window.scrollTo(0,0);
}

function goBack(){
  history.back();
}
function goHome(){
  renderHome(); navigate('home');
}

// Handle browser back/forward
window.addEventListener('popstate', e=>{
  const st=e.state;
  if(!st||st.view==='home') { renderHome(); navigate('home',false); }
  else if(st.view==='cat')  { _selCat=st.cat; renderCat(); navigate('cat',false); }
  else if(st.view==='pilot'){
    _selCat=st.cat;
    _selPilot=(_data?.pilots||[]).find(p=>p.dorsal===st.dorsal&&p.cat===st.cat)||_selPilot;
    if(_selPilot){renderPilot();navigate('pilot',false);}
    else{renderCat();navigate('cat',false);}
  }
});

// ── RENDER HOME ───────────────────────────────────────────────
function renderHome(){
  const d=_data; if(!d) return;
  const pilots=d.pilots||[];
  document.getElementById('hRace').textContent=d.raceName||'Trial Revolution';
  document.getElementById('hPilots').textContent=pilots.length;
  const activeCats=CAT_ORDER.filter(c=>pilots.some(p=>p.cat===c));
  document.getElementById('hCats').textContent=activeCats.length;
  document.getElementById('hFin').textContent=pilots.filter(p=>p.totalTime&&!p.dnf&&!p.dsq).length;

  if(d.raceDate){
    const rd=new Date(d.raceDate+'T12:00:00');
    document.getElementById('hDate').textContent=
      rd.toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  }
  document.getElementById('hOrg').textContent=d.organizer||'';

  // Footer dinámico
  const ftEl=document.getElementById('footerTxt');
  if(ftEl){
    const ftDate=d.raceDate?new Date(d.raceDate+'T12:00:00').toLocaleDateString('es-ES',{day:'2-digit',month:'2-digit',year:'numeric'}):'';
    ftEl.textContent=(d.raceName||'Trial Revolution')+(ftDate?' · '+ftDate:'')+(d.organizer?' · '+d.organizer:'');
  }

  const now=new Date();
  document.getElementById('hUpd').textContent=
    'Actualizado: '+pad(now.getHours())+':'+pad(now.getMinutes())+':'+pad(now.getSeconds());

  const sb=document.getElementById('sBadge');
  if(d.raceStarted){
    sb.className='blive'; sb.innerHTML='<div class="ldot"></div>En directo';
    const tk=document.getElementById('ticker'); tk.style.display='flex';
    const parts=activeCats.map(cat=>{
      const s=sortPilots(pilots.filter(p=>p.cat===cat));
      const l=s[0]; if(!l)return null;
      return cat+': '+shortName(l.name)+' — '+(getTotal(l)??'—')+' pts';
    }).filter(Boolean).join('   ·   ');
    document.getElementById('tkTxt').textContent=parts+'   ·   '+parts+'   ·   ';
  } else {
    sb.className='bpre'; sb.textContent='Previa';
    document.getElementById('ticker').style.display='none';
  }

  const grid=document.getElementById('catGrid'); grid.innerHTML='';
  activeCats.forEach(cat=>{
    const col=CAT_COLORS[cat]||'#888';
    const cp=sortPilots(pilots.filter(p=>p.cat===cat));
    const ldr=cp.find(p=>!p.dnf&&!p.dsq);
    const fCount=cp.filter(p=>p.totalTime&&!p.dnf&&!p.dsq).length;
    const rCount=cp.filter(p=>p.dnf).length;
    const tile=document.createElement('div');
    tile.className='ctile'; tile.style.borderColor=col+'33';
    tile.innerHTML=
      `<div class="ctbar" style="background:${col}"></div>`+
      `<div class="ctbody">`+
        `<div class="ctname" style="color:${col}">${cat}</div>`+
        `<div class="ctmeta">${fCount} finalizados${rCount?' · '+rCount+' retirados':''}</div>`+
      `</div>`+
      `<div class="ctcount" style="color:${col}"><div class="ctnum">${cp.length}</div><div class="ctclbl">pilotos</div></div>`+
      `<div class="ctarrow">›</div>`;
    tile.addEventListener('click',()=>{_selCat=cat;renderCat();navigate('cat');});
    grid.appendChild(tile);
  });
}

// ── RENDER CATEGORY ───────────────────────────────────────────
function renderCat(){
  const pilots=(_data?.pilots||[]).filter(p=>p.cat===_selCat);
  const sorted=sortPilots(pilots);
  const col=CAT_COLORS[_selCat]||'#888';
  const strip=document.getElementById('catStrip');
  strip.style.borderBottomColor=col; strip.style.background=`${col}14`;
  document.getElementById('catNm').style.color=col;
  document.getElementById('catNm').textContent=_selCat;
  const _rd=_data?.raceDate?new Date(_data.raceDate+'T12:00:00').toLocaleDateString('es-ES',{day:'2-digit',month:'2-digit',year:'numeric'}):'';
  document.getElementById('catMt').innerHTML=
    `<span style="font-weight:700;color:var(--tx)">${_data?.raceName||''}</span>`+
    (_rd?` <span style="color:var(--mu)">· ${_rd}</span>`:'')+
    `<br>${sorted.length} pilotos · ${sorted.filter(p=>!p.dnf&&!p.dsq).length} en competición`;

  const list=document.getElementById('pList'); list.innerHTML='';
  sorted.forEach((p,i)=>{
    const tp=getTotal(p);
    const pos=p.dsq?'<span style="color:#c2410c;font-size:13px">DQ</span>':
              p.dnf?'<span style="color:var(--dg);font-size:13px">R</span>':
              i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1+'º';
    const row=document.createElement('div');
    row.className='prow';
    row.innerHTML=
      `<div class="ppos">${pos}</div>`+
      `<div class="pdors">${p.dorsal}</div>`+
      `<div class="pinfo"><div class="pname">${p.name}</div>`+
        `<div class="psub">${p.club||'Sin club'}</div></div>`+
      `<div class="pright">`+
        `<div class="ppts" style="color:${p.dnf||p.dsq?'var(--mu)':col}">${tp!==null?tp:'—'}</div>`+
        `<div class="pplbl">puntos</div>`+
        `<div>${lapBadge(p)}</div></div>`;
    row.addEventListener('click',()=>{_selPilot=p;renderPilot();navigate('pilot');});
    list.appendChild(row);
  });
}

// ── RENDER PILOT DETAIL ───────────────────────────────────────
function renderPilot(){
  const p=_selPilot; if(!p) return;
  const col=CAT_COLORS[p.cat]||'#888';
  const cfg=_data?.cfg||{};
  const nz=cfg.numZones||7;
  const l1max=cfg.lap1MaxMins||150;
  const rdurMins=Math.round((cfg.raceDurationHrs||5)*60);

  document.getElementById('pdNm').textContent=p.name;
  const _pdDate=_data?.raceDate?new Date(_data.raceDate+'T12:00:00').toLocaleDateString('es-ES',{day:'2-digit',month:'2-digit',year:'numeric'}):'';
  document.getElementById('pdMt').innerHTML=
    `#${p.dorsal} · ${p.cat}${p.club?' · '+p.club:''}${p.brand?' · '+p.brand:''}`+
    `<br><span style="color:#94a3b8;font-size:10px">${_data?.raceName||''}${_pdDate?' · '+_pdDate:''}</span>`;

  const tp=getTotal(p);
  const l1p=p.lap1Points??lapPts(p,0)??null;
  const l2p=p.lap2Points??lapPts(p,1)??null;
  const l3p=p.lap3Points??lapPts(p,2)??null;
  const zonePts=(l1p??0)+(l2p??0)+(l3p??0);
  const timePen=(p.lap1Penalty||0)+(p.finishPenalty||0);
  const extraPen=(p.extraPenalties||[]).reduce((s,e)=>s+(e.pts||0),0);
  const totalPen=timePen+extraPen;

  document.getElementById('pdTot').innerHTML=
    `<div class="pdchip"><div class="cv">${tp!==null?tp:'—'}</div><div class="cl">Total pts</div></div>`+
    `<div class="pdchip"><div class="cv" style="color:#94a3b8">${zonePts}</div><div class="cl">Zonas</div></div>`+
    `<div class="pdchip"><div class="cv" style="color:#ef4444">${totalPen>0?'+'+totalPen:'0'}</div><div class="cl">Penaliz.</div></div>`+
    (p.totalTime?`<div class="pdchip"><div class="cv" style="font-size:14px">${p.totalTime}</div><div class="cl">Tiempo</div></div>`:'');

  // Score distribution bar
  const scBar=[[0,'var(--s0)'],[1,'var(--s1)'],[2,'var(--s2)'],[3,'var(--s3)'],[5,'var(--s5)']]
    .map(([v,c])=>`<div class="scchip" style="background:${c}22;color:${c};border:1px solid ${c}44">
      <span style="font-size:14px">${v}</span><span>×${cnt(p,v)}</span></div>`).join('');

  // Tope times
  const sch=p.schedStart||null;
  const ch1tope=sch?addMins(sch,l1max):null;
  const chftope=sch?addMins(sch,rdurMins):null;

  // Lap details
  const lapDefs=[
    {title:'1ª Vuelta',pts:l1p,arr:p.arrV1,tope:ch1tope,pen:p.lap1Penalty||0,dur:p.lap1Time,li:0},
    {title:'2ª Vuelta',pts:l2p,arr:p.arrV2,tope:null,pen:0,dur:p.lap2Time,li:1},
    {title:'3ª Vuelta — CHF',pts:l3p,arr:p.arrCHF,tope:chftope,pen:p.finishPenalty||0,dur:p.lap3Time,li:2},
  ];

  const lapsHtml=lapDefs.map(({title,pts,arr,tope,pen,dur,li})=>{
    const scores=p.scores[li]||[];
    const zonesHtml=Array.from({length:nz},(_,z)=>{
      const v=scores[z];
      return `<div class="zcell"><div class="zlbl">Z${z+1}</div>`+
        `<div class="zval ${zoneClass(v)}">${v!==null&&v!==undefined?v:'—'}</div></div>`;
    }).join('');

    const isLate=pen>0;
    const timesHtml=

      (arr?`<div class="tchip"><div class="tl">Llegada real</div><div class="tv ${isLate?'twn':'tok'}">${arr}</div></div>`:'<div class="tchip"><div class="tl">Llegada real</div><div class="tv">—</div></div>')+
      (tope?`<div class="tchip"><div class="tl">Hora tope</div><div class="tv">${tope}</div></div>`:'')+
      (dur?`<div class="tchip"><div class="tl">Tiempo vuelta</div><div class="tv">${dur}</div></div>`:'')+
      (pen>0?`<div class="tchip"><div class="tl">Penaliz. tiempo</div><div class="tv twn">+${pen} pts</div></div>`:'');

    return `<div class="lapcard">
      <div class="laphead"><div class="laptitle">${title}</div><div class="lappts">${pts!==null?pts+' pts':'—'}</div></div>
      <div class="zgrid">${zonesHtml}</div>
      <div class="timegrid">${timesHtml}</div>
    </div>`;
  }).join('');

  // Extra penalties
  const extras=p.extraPenalties||[];
  const extrasHtml=extras.length?
    `<div class="pdsec"><div class="pdstitle">Penalizaciones adicionales</div>`+
    `<div class="penlist">${extras.map(ep=>`<div class="penitem"><div class="penpts">+${ep.pts}</div><div class="penrsn">${ep.reason||'Sin motivo'}</div><div class="pents">${ep.ts||''}</div></div>`).join('')}</div></div>`:'';

  const statusHtml=p.dsq?
    `<div style="margin:12px 14px;background:rgba(194,65,12,.1);border:1px solid rgba(194,65,12,.4);border-radius:10px;padding:10px 14px"><div style="font-weight:800;color:#c2410c;font-size:13px;margin-bottom:4px">⛔ DESCALIFICADO</div><div style="font-size:12px">${p.dsqReason||'Sin motivo'}</div></div>`:
    p.dnf?`<div style="margin:12px 14px;background:rgba(185,28,28,.08);border:1px solid rgba(185,28,28,.3);border-radius:10px;padding:10px 14px"><div style="font-weight:800;color:var(--dg);font-size:13px">🚩 RETIRADO</div></div>`:'';

  const schedHtml = sch
    ? `<div style="display:flex;align-items:center;gap:10px;margin:10px 14px;background:var(--sf2);border:1px solid var(--bd);border-radius:10px;padding:10px 14px">`+
      `<div style="font-size:20px">🏁</div>`+
      `<div><div style="font-size:9px;color:var(--mu);text-transform:uppercase;letter-spacing:.5px">Hora de salida programada</div>`+
      `<div style="font-size:20px;font-weight:900;font-family:monospace;color:var(--ac)">${sch}</div></div></div>`
    : '';

  document.getElementById('pdBody').innerHTML=
    statusHtml+
    schedHtml+
    `<div class="pdsec"><div class="pdstitle">Distribución de puntuaciones</div></div>`+
    `<div class="scbar">${scBar}</div>`+
    lapsHtml+extrasHtml;
}

function addMins(hhmm,mins){
  if(!hhmm)return null;
  const[h,m]=hhmm.split(':').map(Number);
  const t=h*60+m+mins;
  return pad(Math.floor(t/60)%24)+':'+pad(t%60);
}

// ── FETCH ─────────────────────────────────────────────────────
async function fetchData(){
  try{
    const res=await fetch(DATA_URL+'?t='+Date.now());
    if(!res.ok)return;
    const d=await res.json();
    if(!d||!d.pilots)return;
    _data=d;
    // Refresh pilot detail if open
    if(_selPilot){
      _selPilot=d.pilots.find(p=>p.dorsal===_selPilot.dorsal&&p.cat===_selPilot.cat)||_selPilot;
    }
    const h=location.hash;
    if(!h||h==='#home'||h===''){
      renderHome();
      if(h===''){ history.replaceState({view:'home'},'','#home'); navigate('home',false); }
    } else if(h.startsWith('#cat-')){
      _selCat=h.replace('#cat-','');renderCat();navigate('cat',false);
    } else if(h.startsWith('#pilot-')){
      // stay on pilot view, just refresh data
    }
    if(_data&&document.getElementById('vWait').style.display!=='none'){
      document.getElementById('vWait').style.display='none';
      renderHome(); history.replaceState({view:'home'},'','#home'); navigate('home',false);
    }
  }catch(e){}
}

// Initial load
document.getElementById('vWait').style.display='flex';
history.replaceState({view:'home'},'','#home');
fetchData();
setInterval(fetchData, POLL_MS);
</script>
