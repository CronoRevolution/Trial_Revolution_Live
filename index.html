<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#1a1f35">
<title>Trial Revolution — Clasificación en Directo</title>
<style>
:root {
  --bg:#f0f2f5; --surface:#fff; --surface2:#e8ecf2; --border:#d1d9e6;
  --text:#0a0f1e; --muted:#4a5568; --header-bg:#1a1f35; --header-text:#fff;
  --accent:#c47c00; --success:#15803d; --danger:#b91c1c;
  --tr1:#b91c1c; --tr2:#1d4ed8; --tr3:#15803d; --tr4:#a16207; --tr5:#c2410c; --tr5a:#374151;
  --gold:#92400e; --shadow:rgba(0,0,0,.1);
  --badge-bg:#f1f5f9; --badge-border:#cbd5e1;
}
[data-theme="dark"] {
  --bg:#0a0c14; --surface:#111828; --surface2:#1a2236; --border:#252d42;
  --text:#e2e8f0; --muted:#64748b; --header-bg:#080b14; --header-text:#f1f5f9;
  --accent:#f59e0b; --success:#22c55e; --danger:#ef4444;
  --shadow:rgba(0,0,0,.4);
  --badge-bg:#1e2a3a; --badge-border:#2d3f56;
}

*{box-sizing:border-box;margin:0;padding:0;}
html,body{min-height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);transition:background .25s,color .25s;}

/* ── HEADER ── */
header{background:var(--header-bg);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px;position:sticky;top:0;z-index:50;box-shadow:0 2px 12px var(--shadow);}
.h-logo{font-weight:900;font-size:18px;letter-spacing:1px;color:#f59e0b;line-height:1;}
.h-logo small{display:block;font-size:10px;font-weight:400;color:#94a3b8;letter-spacing:2px;text-transform:uppercase;margin-top:2px;}
.h-right{display:flex;align-items:center;gap:10px;}
.live-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(185,28,28,.2);border:1px solid rgba(185,28,28,.5);border-radius:20px;padding:4px 10px;font-size:10px;font-weight:700;letter-spacing:1.5px;color:#fca5a5;text-transform:uppercase;}
.live-dot{width:7px;height:7px;border-radius:50%;background:#ef4444;animation:blink 1s step-end infinite;}
.waiting-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(100,116,139,.15);border:1px solid rgba(100,116,139,.3);border-radius:20px;padding:4px 10px;font-size:10px;font-weight:700;letter-spacing:1.5px;color:#94a3b8;text-transform:uppercase;}
@keyframes blink{50%{opacity:0;}}
.clock{font-family:'SF Mono',Menlo,'Courier New',monospace;font-size:16px;font-weight:700;color:#f59e0b;letter-spacing:1px;}
.btn-icon{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:8px;padding:6px 10px;color:#e2e8f0;font-size:15px;cursor:pointer;transition:background .15s;}
.btn-icon:hover{background:rgba(255,255,255,.16);}

/* ── TICKER ── */
.ticker{background:var(--header-bg);border-bottom:2px solid var(--accent);height:26px;display:flex;align-items:center;overflow:hidden;font-size:11px;font-weight:700;letter-spacing:.5px;}
.ticker-label{background:var(--accent);color:#000;padding:0 12px;height:100%;display:flex;align-items:center;font-size:12px;font-weight:800;letter-spacing:2px;flex-shrink:0;}
.ticker-inner{white-space:nowrap;animation:scroll 45s linear infinite;padding-left:24px;color:#94a3b8;}
@keyframes scroll{from{transform:translateX(0);}to{transform:translateX(-50%);}}

/* ── LAST UPDATE ── */
.last-update{font-size:10px;color:var(--muted);text-align:center;padding:4px 0;letter-spacing:.5px;}

/* ── CATEGORY SECTIONS ── */
.cats{padding:8px 12px 24px;display:flex;flex-direction:column;gap:12px;}
.cat-card{background:var(--surface);border-radius:12px;overflow:hidden;box-shadow:0 2px 8px var(--shadow);}
.cat-header{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;border-left:5px solid transparent;}
.cat-name{font-weight:900;font-size:16px;letter-spacing:2px;}
.cat-meta{font-size:11px;color:var(--muted);text-align:right;line-height:1.4;}
.cat-leader{font-weight:700;font-size:12px;color:var(--text);}

/* ── TABLE ── */
table{width:100%;border-collapse:collapse;font-size:13px;}
thead tr{background:var(--surface2);border-bottom:2px solid var(--border);}
th{padding:6px 8px;font-size:9px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--muted);text-align:center;}
th.left{text-align:left;}
td{padding:8px 8px;border-bottom:1px solid var(--border);vertical-align:middle;}
td.left{text-align:left;}
tbody tr:last-child td{border-bottom:none;}
tbody tr:hover{background:var(--surface2);}

/* ── ROW ELEMENTS ── */
.pos{font-weight:900;font-size:15px;text-align:center;}
.pos-1{color:#92400e;} .pos-2{color:#4b5563;} .pos-3{color:#7c2d12;}
.p-name{font-weight:700;font-size:14px;color:var(--text);}
.p-sub{font-size:10px;color:var(--muted);margin-top:1px;}
.sv{font-family:'SF Mono',Menlo,'Courier New',monospace;font-size:14px;font-weight:800;text-align:center;display:block;}
.sv-0{color:#15803d;} .sv-1{color:#1d4ed8;} .sv-2{color:#a16207;} .sv-3{color:#b91c1c;} .sv-5{color:#7e22ce;} .sv-pen{color:#b91c1c;}
.total{font-family:'SF Mono',Menlo,'Courier New',monospace;font-size:16px;font-weight:900;color:var(--text);text-align:center;display:block;}

.badge{display:inline-block;padding:3px 8px;border-radius:6px;font-size:10px;font-weight:800;letter-spacing:.5px;border:1.5px solid;white-space:nowrap;}
.b-v1{background:var(--badge-bg);color:#1d4ed8;border-color:#93c5fd;}
.b-v2{background:var(--badge-bg);color:#a16207;border-color:#fcd34d;}
.b-v3{background:var(--badge-bg);color:#7e22ce;border-color:#d8b4fe;}
.b-fin{background:#dcfce7;color:#15803d;border-color:#86efac;}
.b-dnf{background:#fee2e2;color:#b91c1c;border-color:#fca5a5;}
.b-dq{background:#ffedd5;color:#c2410c;border-color:#fdba74;}

/* ── WAITING SCREEN ── */
#waiting{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:16px;text-align:center;padding:40px 20px;}
.w-logo{font-weight:900;font-size:52px;letter-spacing:4px;color:#f59e0b;line-height:1;}
.w-sub{font-size:13px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;}
.w-dot-row{display:flex;gap:8px;margin-top:4px;}
.w-dot{width:8px;height:8px;border-radius:50%;background:var(--muted);animation:dotpulse 1.2s ease-in-out infinite;}
.w-dot:nth-child(2){animation-delay:.2s;} .w-dot:nth-child(3){animation-delay:.4s;}
@keyframes dotpulse{0%,80%,100%{opacity:.3;}40%{opacity:1;}}

/* ── CATEGORY COLORS ── */
.hdr-TR1{border-color:var(--tr1)!important;} .hdr-TR2{border-color:var(--tr2)!important;}
.hdr-TR3{border-color:var(--tr3)!important;} .hdr-TR4{border-color:var(--tr4)!important;}
.hdr-TR5{border-color:var(--tr5)!important;} .hdr-TR5A{border-color:var(--tr5a)!important;}
.txt-TR1{color:var(--tr1);} .txt-TR2{color:var(--tr2);} .txt-TR3{color:var(--tr3);}
.txt-TR4{color:var(--tr4);} .txt-TR5{color:var(--tr5);} .txt-TR5A{color:var(--tr5a);}

/* ── STATS BAR ── */
.stats-bar{display:grid;grid-template-columns:repeat(auto-fit,minmax(80px,1fr));gap:1px;background:var(--border);margin:0 12px 12px;border-radius:10px;overflow:hidden;}
.stat-item{background:var(--surface);padding:8px 4px;text-align:center;}
.stat-val{font-family:'SF Mono',Menlo,monospace;font-size:22px;font-weight:900;}
.stat-lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:1px;}

/* ── FOOTER ── */
footer{text-align:center;padding:20px 16px;font-size:10px;color:var(--muted);letter-spacing:1px;border-top:1px solid var(--border);margin-top:8px;}

@media(max-width:480px){
  th,td{padding:6px 4px;}
  .p-name{font-size:13px;}
  .sv{font-size:13px;}
  .total{font-size:15px;}
}
</style>
</head>
<body>

<header>
  <div class="h-logo">Trial Revolution <small>Campeonato de Trial · CyL 2026</small></div>
  <div class="h-right">
    <span id="statusBadge" class="waiting-badge">En espera</span>
    <div class="clock" id="clock">--:--:--</div>
    <button class="btn-icon" id="themeBtn" title="Cambiar tema" onclick="toggleTheme()">🌙</button>
  </div>
</header>

<div class="ticker" id="tickerBar" style="display:none">
  <div class="ticker-label">EN DIRECTO</div>
  <div class="ticker-inner" id="tickerText"></div>
</div>

<div class="last-update" id="lastUpdate"></div>

<div id="waiting">
  <div class="w-logo">Trial<br>Revolution</div>
  <div class="w-sub">Clasificación en directo</div>
  <div class="w-dot-row"><div class="w-dot"></div><div class="w-dot"></div><div class="w-dot"></div></div>
  <div style="font-size:12px;color:var(--muted);margin-top:8px">Actualizando cada 30 segundos…</div>
</div>

<div id="statsBar" class="stats-bar" style="display:none"></div>
<div id="cats" class="cats" style="display:none"></div>

<footer id="footer" style="display:none">
  Trial Revolution · Campeonato de Trial de Castilla y León 2026 · Generado automáticamente
</footer>

<script>
const CAT_ORDER = ['TR1','TR2','TR3','TR4','TR5','TR5A'];
const DATA_URL  = 'data.json';
const POLL_MS   = 30000;

// ── Theme ─────────────────────────────────────────────────────
const _saved = localStorage.getItem('tr_theme');
const _pref  = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
let   theme  = _saved || _pref;
function applyTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  document.getElementById('themeBtn').textContent = t === 'dark' ? '☀️' : '🌙';
  localStorage.setItem('tr_theme', t);
}
function toggleTheme() { theme = theme === 'dark' ? 'light' : 'dark'; applyTheme(theme); }
applyTheme(theme);

// ── Clock ─────────────────────────────────────────────────────
function pad(n){ return n.toString().padStart(2,'0'); }
setInterval(() => {
  const n = new Date();
  document.getElementById('clock').textContent = pad(n.getHours())+':'+pad(n.getMinutes())+':'+pad(n.getSeconds());
}, 500);

// ── Helpers ───────────────────────────────────────────────────
const CAT_COLORS = {TR1:'#b91c1c',TR2:'#1d4ed8',TR3:'#15803d',TR4:'#a16207',TR5:'#c2410c',TR5A:'#374151'};

function shortName(name) {
  const p = name.split(',');
  return p.length < 2 ? name : p[1].trim().split(' ')[0] + ' ' + p[0].trim();
}
function lapBadge(p) {
  if (p.dsq || p.dnf === 'DQ') return '<span class="badge b-dq">DQ</span>';
  if (p.dnf)   return '<span class="badge b-dnf">R</span>';
  if (p.finishTime !== null) return '<span class="badge b-fin">✓ FIN</span>';
  const hasV3  = p.scores[2] && p.scores[2].some(v=>v!==null);
  const lap1   = p.lap1Time !== null;
  const hasV2  = p.scores[1] && p.scores[1].some(v=>v!==null);
  if (hasV3 || (lap1 && hasV2)) return '<span class="badge b-v3">V3</span>';
  if (lap1 || (p.scores[0] && p.scores[0].some(v=>v!==null))) return '<span class="badge b-v2">V2</span>';
  return '<span class="badge b-v1">V1</span>';
}
function cnt(p, val) {
  let n=0;
  for(let l=0;l<3;l++) for(let z=0;z<7;z++) if(p.scores[l]&&p.scores[l][z]===val) n++;
  return n;
}
function getTotal(p) {
  let t=0,any=false;
  for(let l=0;l<3;l++){
    const s=p.scores[l]; if(!s) continue;
    const lp=s.every(v=>v===null)?null:s.reduce((a,v)=>a+(v===null?0:v),0);
    if(lp!==null){t+=lp;any=true;}
  }
  if(!any) return null;
  const extra=(p.extraPenalties||[]).reduce((s,ep)=>s+(ep.pts||0),0);
  return t+(p.lap1Penalty||0)+(p.finishPenalty||0)+extra;
}
function sortPilots(arr) {
  return arr.slice().sort((a,b)=>{
    if((a.dnf||a.dsq)&&!(b.dnf||b.dsq)) return 1;
    if(!(a.dnf||a.dsq)&&(b.dnf||b.dsq)) return -1;
    const pa=getTotal(a)??9999, pb=getTotal(b)??9999;
    if(pa!==pb) return pa-pb;
    if(cnt(b,0)!==cnt(a,0)) return cnt(b,0)-cnt(a,0);
    return cnt(b,1)-cnt(a,1);
  });
}

// ── Render ─────────────────────────────────────────────────────
function render(data) {
  const pilots   = data.pilots || [];
  const numZones = data.cfg?.numZones || 7;

  // Badge
  const badge = document.getElementById('statusBadge');
  if (data.raceStarted) {
    badge.className = 'live-badge';
    badge.innerHTML = '<div class="live-dot"></div>En directo';
  } else {
    badge.className = 'waiting-badge';
    badge.textContent = 'Previa';
  }

  // Last update
  const now = new Date();
  document.getElementById('lastUpdate').textContent =
    'Actualizado: ' + pad(now.getHours())+':'+pad(now.getMinutes())+':'+pad(now.getSeconds());

  // Stats bar
  const activeCats = CAT_ORDER.filter(c => pilots.some(p=>p.cat===c));
  const statsEl = document.getElementById('statsBar');
  statsEl.style.display = '';
  const finCount = pilots.filter(p=>p.finishTime!==null&&!p.dnf&&!p.dsq).length;
  const rCount   = pilots.filter(p=>p.dnf).length;
  statsEl.innerHTML =
    activeCats.map(c=>{const n=pilots.filter(p=>p.cat===c).length;return`<div class="stat-item"><div class="stat-val" style="color:${CAT_COLORS[c]}">${n}</div><div class="stat-lbl">${c}</div></div>`;}).join('')
    + `<div class="stat-item"><div class="stat-val">${pilots.length}</div><div class="stat-lbl">Total</div></div>`
    + `<div class="stat-item"><div class="stat-val" style="color:var(--success)">${finCount}</div><div class="stat-lbl">Fin.</div></div>`
    + (rCount?`<div class="stat-item"><div class="stat-val" style="color:var(--danger)">${rCount}</div><div class="stat-lbl">Ret.</div></div>`:'');

  // Category panels
  const catsEl = document.getElementById('cats');
  catsEl.style.display = '';
  catsEl.innerHTML = '';

  activeCats.forEach(cat => {
    const sorted = sortPilots(pilots.filter(p=>p.cat===cat));
    const leader = sorted.find(p=>!p.dnf&&!p.dsq);
    const col    = CAT_COLORS[cat] || '#888';

    const rows = sorted.map((p,i)=>{
      const pos   = p.dsq ? 'DQ' : p.dnf ? 'R' : (i+1)+'º';
      const pCls  = p.dsq?'':'pos-'+(i+1<=3?i+1:'n');
      const tp    = getTotal(p);
      const timePen  = (p.lap1Penalty||0)+(p.finishPenalty||0);
      const extraPen = (p.extraPenalties||[]).reduce((s,ep)=>s+(ep.pts||0),0);
      return `<tr>
        <td><div class="pos ${pCls}" style="${p.dsq?'color:#c2410c':''}">${pos}</div></td>
        <td class="left">
          <div class="p-name">${shortName(p.name)}</div>
          <div class="p-sub">#${p.dorsal}${p.club?' · '+p.club:''}</div>
        </td>
        <td><span class="sv sv-0">${cnt(p,0)}</span></td>
        <td><span class="sv sv-1">${cnt(p,1)}</span></td>
        <td><span class="sv sv-3">${cnt(p,3)}</span></td>
        <td><span class="sv sv-5">${cnt(p,5)}</span></td>
        <td>${timePen+extraPen>0?`<span class="sv sv-pen">+${timePen+extraPen}</span>`:'<span style="color:var(--muted)">—</span>'}</td>
        <td>${tp!==null?`<span class="total">${tp}</span>`:'<span style="color:var(--muted)">—</span>'}</td>
        <td>${lapBadge(p)}</td>
      </tr>`;
    }).join('');

    const el = document.createElement('div');
    el.className = 'cat-card';
    el.innerHTML = `
      <div class="cat-header hdr-${cat}" style="border-left-color:${col}">
        <div class="cat-name txt-${cat}">${cat}</div>
        <div class="cat-meta">
          ${leader?`<div class="cat-leader">${shortName(leader.name)}</div><div>Líder: <b>${getTotal(leader)??'—'}</b> pts · ${sorted.length} pilotos</div>`:`${sorted.length} pilotos`}
        </div>
      </div>
      <table>
        <thead><tr>
          <th style="width:32px">Pos</th>
          <th class="left">Piloto</th>
          <th style="color:var(--success)">0s</th>
          <th style="color:#1d4ed8">1s</th>
          <th style="color:var(--danger)">3s</th>
          <th style="color:#7e22ce">5s</th>
          <th style="color:var(--danger)">+Pen</th>
          <th>Total</th>
          <th>Vuelta</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
    catsEl.appendChild(el);
  });

  // Ticker
  if (data.raceStarted) {
    document.getElementById('tickerBar').style.display = '';
    const parts = activeCats.map(cat=>{
      const best = sortPilots(pilots.filter(p=>p.cat===cat&&!p.dnf&&!p.dsq));
      if (!best.length) return null;
      const l  = best[0], tp = getTotal(l);
      return `${cat}: ${shortName(l.name)} — ${tp!==null?tp+' pts':'—'} · ${lapBadge(l).replace(/<[^>]+>/g,'')}`;
    }).filter(Boolean).join('   ·   ');
    const t = parts + '   ·   ' + parts + '   ·   ';
    document.getElementById('tickerText').textContent = t;
  }

  document.getElementById('waiting').style.display = 'none';
  document.getElementById('footer').style.display   = '';
}

// ── Fetch ─────────────────────────────────────────────────────
async function fetchData() {
  try {
    const res  = await fetch(DATA_URL + '?t=' + Date.now());
    if (!res.ok) return;
    const data = await res.json();
    if (data && data.pilots) render(data);
  } catch(e) { /* red not available */ }
}
fetchData();
setInterval(fetchData, POLL_MS);
</script>
</body>
</html>
