<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#1a1f35">
<title>Histórico — Trial Revolution</title>
<style>
:root{
  --bg:#f0f2f5;--sf:#fff;--sf2:#e8ecf2;--bd:#d1d9e6;
  --tx:#0a0f1e;--mu:#64748b;--hbg:#1a1f35;
  --ac:#c47c00;--acl:#f59e0b;
  --ok:#15803d;--dg:#b91c1c;--wn:#a16207;
  --c1:#b91c1c;--c2:#1d4ed8;--c3:#15803d;--c4:#a16207;--c5:#c2410c;--c5a:#374151;
  --sh:rgba(0,0,0,.07);
  --s0:#15803d;--s1:#1d4ed8;--s2:#a16207;--s3:#b91c1c;--s5:#7e22ce;
}
[data-theme=dark]{
  --bg:#080b12;--sf:#111826;--sf2:#1a2236;--bd:#232d42;
  --tx:#e2e8f0;--mu:#64748b;--hbg:#060810;
  --ac:#f59e0b;--acl:#fbbf24;--ok:#22c55e;--dg:#ef4444;
  --sh:rgba(0,0,0,.4);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{min-height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:var(--bg);color:var(--tx);transition:background .2s,color .2s;}

/* HEADER */
.hdr{background:var(--hbg);padding:10px 14px;display:flex;align-items:center;gap:10px;
  position:sticky;top:0;z-index:100;box-shadow:0 2px 10px var(--sh);}
.hbk{background:rgba(255,255,255,.1);border:none;border-radius:8px;padding:6px 10px;
  color:#e2e8f0;font-size:16px;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;}
.htitle{flex:1;font-weight:800;font-size:16px;color:#f59e0b;line-height:1.2;min-width:0;}
.htitle small{display:block;font-size:9px;font-weight:400;color:#94a3b8;letter-spacing:2px;
  text-transform:uppercase;margin-top:2px;}
.hright{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.ibtn{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:8px;
  padding:5px 9px;color:#e2e8f0;font-size:14px;cursor:pointer;}
.barchive{display:inline-flex;align-items:center;gap:5px;background:rgba(59,130,246,.18);
  border:1px solid rgba(59,130,246,.4);border-radius:20px;padding:3px 9px;font-size:9px;
  font-weight:800;letter-spacing:1.5px;color:#93c5fd;text-transform:uppercase;}

/* HERO (lista de pruebas o detalle) */
.hero{background:var(--hbg);padding:24px 16px 20px;text-align:center;}
.hero-race{font-size:22px;font-weight:900;color:#f59e0b;letter-spacing:1px;line-height:1.2;}
.hero-sub{font-size:11px;color:#94a3b8;margin-top:4px;letter-spacing:1px;}
.hero-date{font-size:13px;color:#cbd5e1;margin-top:8px;font-weight:600;}
.hero-org{font-size:11px;color:#94a3b8;margin-top:2px;}
.hero-stats{display:flex;justify-content:center;gap:24px;margin-top:14px;}
.hstat .v{font-size:28px;font-weight:900;color:#f59e0b;}
.hstat .l{font-size:9px;color:#94a3b8;text-transform:uppercase;letter-spacing:1.5px;}

/* YEAR HEADERS + RACE CARDS */
.year-header{padding:18px 16px 8px;display:flex;align-items:baseline;gap:10px;}
.year-label{font-family:'Bebas Neue',sans-serif;font-size:30px;letter-spacing:4px;color:var(--tx);font-weight:900;}
.year-count{font-size:11px;color:var(--mu);text-transform:uppercase;letter-spacing:1.5px;font-weight:700;}

.racegrid{padding:0 12px;display:flex;flex-direction:column;gap:10px;}
.rtile{background:var(--sf);border-radius:14px;box-shadow:0 2px 8px var(--sh);
  display:flex;align-items:center;overflow:hidden;cursor:pointer;
  transition:transform .1s;border:2px solid transparent;}
.rtile:hover{border-color:#3b82f6;}
.rtile:active{transform:scale(.98);}
.rtbar{width:6px;align-self:stretch;flex-shrink:0;background:#3b82f6;}
.rtbody{flex:1;padding:14px;min-width:0;}
.rtname{font-size:15px;font-weight:800;line-height:1.2;color:var(--tx);}
.rtmeta{font-size:11px;color:var(--mu);margin-top:5px;display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
.rtmeta .pill{background:var(--sf2);padding:2px 9px;border-radius:8px;font-size:10px;letter-spacing:.3px;font-weight:600;}
.rtmeta .pill.org{color:var(--ac);font-weight:700;}
.rtcount{padding:0 14px;text-align:center;flex-shrink:0;}
.rtnum{font-size:24px;font-weight:900;color:var(--ac);font-family:monospace;line-height:1;}
.rtclbl{font-size:8px;color:var(--mu);text-transform:uppercase;letter-spacing:1px;margin-top:3px;}
.rtarrow{font-size:18px;color:var(--mu);padding-right:14px;}

.empty{text-align:center;padding:60px 20px;color:var(--mu);}
.empty-icon{font-size:48px;opacity:.3;margin-bottom:14px;}
.empty-title{font-size:15px;font-weight:700;margin-bottom:6px;color:var(--tx);}

.loading{text-align:center;padding:60px 20px;color:var(--mu);}
.loading::after{content:'';display:inline-block;width:32px;height:32px;border:3px solid var(--bd);
  border-top-color:var(--ac);border-radius:50%;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* CATEGORY VIEW within a race (same as index.html) */
.catstrip{padding:12px 14px 10px;border-bottom:3px solid transparent;}
.catname{font-size:28px;font-weight:900;letter-spacing:4px;}
.catmeta{font-size:12px;color:var(--mu);margin-top:2px;}
.plist{display:flex;flex-direction:column;}
.prow{background:var(--sf);border-bottom:1px solid var(--bd);display:flex;
  align-items:center;gap:10px;padding:11px 14px;cursor:pointer;transition:background .1s;}
.prow:active{background:var(--sf2);}
.ppos{font-size:19px;font-weight:900;width:30px;text-align:center;flex-shrink:0;}
.ppos.top1{color:#fbbf24;}
.ppos.top2{color:#94a3b8;}
.ppos.top3{color:#d97706;}
.pdors{font-size:17px;font-weight:900;width:30px;text-align:center;flex-shrink:0;color:var(--ac);}
.pinfo{flex:1;min-width:0;}
.pname{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.psub{font-size:11px;color:var(--mu);margin-top:1px;}
.pright{text-align:right;flex-shrink:0;}
.ppts{font-size:18px;font-weight:900;font-family:monospace;}
.pplbl{font-size:9px;color:var(--mu);text-transform:uppercase;letter-spacing:.5px;}
.pbdg{display:inline-block;padding:2px 8px;border-radius:5px;font-size:10px;
  font-weight:800;letter-spacing:.5px;border:1.5px solid;margin-top:3px;}
.bv1{background:rgba(29,78,216,.1);color:#1d4ed8;border-color:#93c5fd;}
.bv2{background:rgba(161,98,7,.1);color:#a16207;border-color:#fcd34d;}
.bv3{background:rgba(126,34,206,.1);color:#7e22ce;border-color:#d8b4fe;}
.bfin{background:rgba(21,128,61,.1);color:#15803d;border-color:#86efac;}
.br{background:rgba(185,28,28,.1);color:#b91c1c;border-color:#fca5a5;}
.bdq{background:rgba(194,65,12,.1);color:#c2410c;border-color:#fdba74;}
.prow.dsq{opacity:.55;}

/* PILOT DETAIL */
.pdhero{background:var(--hbg);padding:14px 16px;}
.pdname{font-size:18px;font-weight:900;color:#f1f5f9;line-height:1.2;}
.pdmeta{font-size:11px;color:#94a3b8;margin-top:3px;}
.pdtotals{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;}
.pdchip{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);
  border-radius:10px;padding:8px 12px;text-align:center;flex:1;min-width:70px;}
.pdchip .cv{font-size:20px;font-weight:900;font-family:monospace;color:#f59e0b;}
.pdchip .cl{font-size:9px;color:#94a3b8;text-transform:uppercase;letter-spacing:1px;margin-top:2px;}

.pdsec{padding:12px 14px 0;}
.pdstitle{font-size:11px;font-weight:800;letter-spacing:2px;text-transform:uppercase;
  color:var(--mu);margin-bottom:8px;}

.scbar{display:flex;gap:6px;flex-wrap:wrap;padding:0 14px 10px;}
.scchip{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:8px;
  font-size:13px;font-weight:800;font-family:monospace;}

.lapcard{background:var(--sf);border-radius:12px;box-shadow:0 1px 6px var(--sh);
  margin:0 12px 10px;overflow:hidden;}
.laphead{display:flex;align-items:center;justify-content:space-between;
  padding:8px 14px;background:var(--sf2);border-bottom:1px solid var(--bd);}
.laptitle{font-weight:800;font-size:13px;letter-spacing:1px;}
.lappts{font-family:monospace;font-size:16px;font-weight:900;color:var(--ac);}

.zgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;padding:10px 12px;}
.zcell{text-align:center;}
.zlbl{font-size:9px;color:var(--mu);margin-bottom:3px;text-transform:uppercase;letter-spacing:.5px;}
.zval{font-size:17px;font-weight:900;font-family:monospace;width:34px;height:34px;
  border-radius:8px;display:inline-flex;align-items:center;justify-content:center;border:1.5px solid;}
.z0{color:var(--s0);background:rgba(21,128,61,.1);border-color:rgba(21,128,61,.3);}
.z1{color:var(--s1);background:rgba(29,78,216,.1);border-color:rgba(29,78,216,.3);}
.z2{color:var(--s2);background:rgba(161,98,7,.1);border-color:rgba(161,98,7,.3);}
.z3{color:var(--s3);background:rgba(185,28,28,.1);border-color:rgba(185,28,28,.3);}
.z5{color:var(--s5);background:rgba(126,34,206,.1);border-color:rgba(126,34,206,.3);}
.zn{color:var(--mu);background:var(--sf2);border-color:var(--bd);}

.timegrid{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:0 12px 10px;}
.tchip{background:var(--sf2);border-radius:8px;padding:8px 10px;}
.tchip .tl{font-size:9px;color:var(--mu);text-transform:uppercase;letter-spacing:.5px;}
.tchip .tv{font-size:14px;font-weight:800;font-family:monospace;margin-top:2px;}
.tv.tok{color:var(--ok);}.tv.twn{color:var(--dg);}

.penlist{padding:0 12px 10px;display:flex;flex-direction:column;gap:6px;}
.penitem{background:rgba(185,28,28,.08);border:1px solid rgba(185,28,28,.2);
  border-radius:8px;padding:8px 12px;display:flex;align-items:center;gap:10px;}
.penpts{font-size:15px;font-weight:900;font-family:monospace;color:var(--dg);flex-shrink:0;}
.penrsn{font-size:12px;color:var(--tx);flex:1;}
.pents{font-size:10px;color:var(--mu);}

footer{text-align:center;padding:20px 16px 30px;font-size:10px;color:var(--mu);
  letter-spacing:.5px;border-top:1px solid var(--bd);margin-top:8px;}

.view{display:none;}.view.active{display:block;}
</style>
</head>
<body>

<header class="hdr" id="hdr">
  <a href="index.html" class="hbk ibtn" title="Volver al inicio">🏠</a>
  <button class="hbk ibtn" id="btnBack" onclick="goBack()" style="display:none">‹</button>
  <div class="htitle" id="hTitle">Histórico <small>Archivo de pruebas</small></div>
  <div class="hright">
    <span class="barchive">📚 Archivo</span>
    <button class="ibtn" onclick="toggleTheme()" id="themeBtn">🌙</button>
  </div>
</header>

<!-- LIST VIEW -->
<div class="view active" id="vList">
  <div id="listContent" class="loading"></div>
</div>

<!-- RACE VIEW -->
<div class="view" id="vRace">
  <div class="hero">
    <div class="hero-race" id="rRace">—</div>
    <div class="hero-sub">Resultados archivados</div>
    <div class="hero-date" id="rDate">—</div>
    <div class="hero-org" id="rOrg">—</div>
    <div class="hero-stats">
      <div class="hstat"><div class="v" id="rPilots">—</div><div class="l">Pilotos</div></div>
      <div class="hstat"><div class="v" id="rCats">—</div><div class="l">Categorías</div></div>
    </div>
  </div>
  <div id="raceCats"></div>
</div>

<!-- CATEGORY VIEW -->
<div class="view" id="vCat">
  <div class="catstrip" id="catStrip">
    <div class="catname" id="catName">—</div>
    <div class="catmeta" id="catMeta">—</div>
  </div>
  <div class="plist" id="catList"></div>
</div>

<!-- PILOT VIEW -->
<div class="view" id="vPilot">
  <div class="pdhero">
    <div class="pdname" id="pName">—</div>
    <div class="pdmeta" id="pMeta">—</div>
    <div class="pdtotals" id="pTotals"></div>
  </div>
  <div id="pBody"></div>
</div>

<footer>© 2026 Crono Revolution · Trial Revolution</footer>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCnasN6ewMMAH5JebMiJeGXYVw8Km-quHc",
  authDomain: "trial-revolution.firebaseapp.com",
  databaseURL: "https://trial-revolution-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "trial-revolution",
  storageBucket: "trial-revolution.firebasestorage.app",
  messagingSenderId: "630413676427",
  appId: "1:630413676427:web:af5a3afd21e67487ba698e"
};
const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);

const CAT_ORDER = ['TR1','TR2','TR3','TR4','TR5','TR5A'];
const CAT_HEX   = { TR1:'#b91c1c', TR2:'#1d4ed8', TR3:'#15803d', TR4:'#a16207', TR5:'#c2410c', TR5A:'#374151' };
const CAT_COLORS = CAT_HEX;
const pad = n => String(n).padStart(2,'0');

let _allArchives = {};
let _filterChamp = localStorage.getItem('tr_hist_champ') || '__all__';
let _currentRace = null; // {year, id, meta, state}
let _selCat = null;
let _selPilot = null;

// ── Tema claro/oscuro ─────────────────────────────────────────────────────
function applyTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  const btn = document.getElementById('themeBtn');
  if (btn) btn.textContent = t === 'dark' ? '☀️' : '🌙';
  try { localStorage.setItem('tr_theme', t); } catch(e){}
}
window.toggleTheme = () => {
  const cur = document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'light';
  applyTheme(cur === 'dark' ? 'light' : 'dark');
};
applyTheme(localStorage.getItem('tr_theme') || 'dark');

// ── Helpers (alineados con index.html) ────────────────────────────────────
function cnt(p,v){let n=0;const nz=(p.scores&&p.scores[0])?p.scores[0].length:7;for(let l=0;l<3;l++)for(let z=0;z<nz;z++)if(p.scores?.[l]?.[z]===v)n++;return n;}
function lapPts(p,l){const s=p.scores?.[l];if(!s||s.every(v=>v===null))return null;return s.reduce((a,v)=>a+(v===null?0:v),0);}
function getTotal(p){
  if(p.totalPoints!==null&&p.totalPoints!==undefined) return p.totalPoints;
  let t=0,any=false;
  for(let l=0;l<3;l++){const lp=lapPts(p,l);if(lp!==null){t+=lp;any=true;}}
  if(!any)return null;
  const ep=(p.extraPenalties||[]).reduce((s,x)=>s+(x.pts||0),0);
  return t+(p.lap1Penalty||0)+(p.finishPenalty||0)+ep;
}
function _totalMs(p){
  if(p.finishTime==null||!p.schedStart)return null;
  const[sh,sm]=p.schedStart.split(':').map(Number);
  const schedMs=(sh*3600+sm*60)*1000;
  let fin=p.finishTime;
  if(fin>1e12){const d=new Date(fin);fin=(d.getHours()*3600+d.getMinutes()*60+d.getSeconds())*1000;}
  return fin-schedMs;
}
function tieBreak(a,b){for(const v of[0,1,2,3]){const d=cnt(b,v)-cnt(a,v);if(d!==0)return d;}const ta=_totalMs(a),tb=_totalMs(b);if(ta!=null&&tb!=null)return ta-tb;if(ta!=null)return-1;if(tb!=null)return 1;return 0;}
function sortCat(arr){return arr.slice().sort((a,b)=>{if(a.dsq&&!b.dsq)return 1;if(!a.dsq&&b.dsq)return-1;if(a.dnf&&!b.dnf)return 1;if(!a.dnf&&b.dnf)return-1;const pa=getTotal(a)??9999,pb=getTotal(b)??9999;if(pa!==pb)return pa-pb;return tieBreak(a,b);});}
function zoneClass(v){if(v===null||v===undefined)return 'zn';return{0:'z0',1:'z1',2:'z2',3:'z3',5:'z5'}[v]||'zn';}
function lapBadge(p){
  if(p.dsq)return '<span class="pbdg bdq">DQ</span>';
  if(p.dnf)return '<span class="pbdg br">R</span>';
  if(p.finishTime!=null){
    const v3Done=p.scores?.[2]?.every(v=>v!==null);
    if(v3Done)return '<span class="pbdg bfin">✓ FIN</span>';
    return '<span class="pbdg bv3">V3</span>';
  }
  if(p.lap2Time!=null)return '<span class="pbdg bv3">V3</span>';
  if(p.lap1Time!=null)return '<span class="pbdg bv2">V2</span>';
  return '<span class="pbdg bv1">V1</span>';
}
function addMins(hhmm,mins){
  if(!hhmm)return null;
  const[h,m]=hhmm.split(':').map(Number);
  const t=h*60+m+mins;
  return pad(Math.floor(t/60)%24)+':'+pad(t%60);
}
function fmtMs(ms){
  if(ms==null||isNaN(ms)||ms<0)return null;
  const s=Math.floor(ms/1000);
  const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),ss=s%60;
  return pad(h)+':'+pad(m)+':'+pad(ss);
}
function arrTime(msOfDay){
  if(msOfDay==null||isNaN(msOfDay))return null;
  const m=((msOfDay%86400000)+86400000)%86400000;
  const s=Math.floor(m/1000);
  return pad(Math.floor(s/3600))+':'+pad(Math.floor((s%3600)/60))+':'+pad(s%60);
}
function lapDuration(startMs,endMs){
  if(startMs==null||endMs==null)return null;
  let d=endMs-startMs;
  if(d<0)d+=86400000;
  return fmtMs(d);
}

// ── Navegación entre vistas ───────────────────────────────────────────────
function showView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('v'+name).classList.add('active');
  const backBtn = document.getElementById('btnBack');
  backBtn.style.display = (name === 'List') ? 'none' : '';
  window.scrollTo(0,0);
}

window.goBack = function() {
  history.back();
};

// ── Carga del índice ──────────────────────────────────────────────────────
async function loadIndex() {
  const content = document.getElementById('listContent');
  try {
    const snap = await get(ref(db, 'races_archive_index'));
    _allArchives = snap.val() || {};
    renderIndex();
  } catch(e) {
    content.classList.remove('loading');
    content.innerHTML = `<div class="empty"><div class="empty-icon">⚠</div><div class="empty-title">Error de conexión</div><div>${e.message}</div></div>`;
  }
}

function renderIndex() {
  const content = document.getElementById('listContent');
  content.classList.remove('loading');
  const years = Object.keys(_allArchives).sort((a,b) => b.localeCompare(a));
  if (!years.length) {
    content.innerHTML = `<div class="empty"><div class="empty-icon">📭</div><div class="empty-title">Sin pruebas archivadas</div><div>Cuando la mesa central archive una carrera aparecerá aquí.</div></div>`;
    return;
  }

  // Recopilar campeonatos disponibles
  const champs = new Set();
  let hasNoChamp = false;
  Object.values(_allArchives).forEach(yr => {
    Object.values(yr || {}).forEach(r => {
      if (r.championship) champs.add(r.championship);
      else hasNoChamp = true;
    });
  });

  // Filtrar usando _filterChamp
  const matchesFilter = (r) => {
    if (_filterChamp === '__all__') return true;
    if (_filterChamp === '__nochamp__') return !r.championship;
    return r.championship === _filterChamp;
  };

  let html = '';

  // Selector de campeonato (siempre visible si hay >0 campeonatos)
  if (champs.size > 0 || hasNoChamp) {
    const opts = ['<option value="__all__">Todos los campeonatos</option>'];
    [...champs].sort().forEach(c => {
      const sel = c === _filterChamp ? 'selected' : '';
      opts.push(`<option value="${c.replace(/"/g,'&quot;')}" ${sel}>${c}</option>`);
    });
    if (hasNoChamp) {
      const sel = _filterChamp === '__nochamp__' ? 'selected' : '';
      opts.push(`<option value="__nochamp__" ${sel}>— Sin campeonato —</option>`);
    }
    if (_filterChamp === '__all__') opts[0] = '<option value="__all__" selected>Todos los campeonatos</option>';
    html += `<div style="padding:14px 14px 4px"><select id="_hChampFilter" onchange="window.setChampFilter(this.value)" style="width:100%;background:var(--sf);border:2px solid var(--bd);border-radius:10px;color:var(--tx);padding:11px 12px;font-size:14px;font-weight:700;-webkit-appearance:none;appearance:none;background-image:url('data:image/svg+xml;utf8,<svg xmlns=&quot;http://www.w3.org/2000/svg&quot; viewBox=&quot;0 0 24 24&quot; fill=&quot;none&quot; stroke=&quot;%2394a3b8&quot; stroke-width=&quot;2.5&quot;><polyline points=&quot;6,9 12,15 18,9&quot;/></svg>');background-repeat:no-repeat;background-position:right 12px center;background-size:18px;padding-right:38px">${opts.join('')}</select></div>`;
  }

  let anyShown = false;
  years.forEach(year => {
    const races = _allArchives[year] || {};
    const ids = Object.keys(races).filter(id => matchesFilter(races[id]));
    if (!ids.length) return;
    // Cronológico ascendente
    ids.sort((a,b) => (races[a].date||'').localeCompare(races[b].date||''));
    anyShown = true;
    html += `<div class="year-header"><div class="year-label">${year}</div><div class="year-count">${ids.length} prueba${ids.length>1?'s':''}</div></div>`;
    html += `<div class="racegrid">`;
    ids.forEach(id => {
      const r = races[id];
      const dateStr = r.date ? new Date(r.date+'T12:00:00').toLocaleDateString('es-ES',{day:'numeric',month:'short'}) : '';
      html += `
        <div class="rtile" onclick="window.openRace('${year}','${id}')">
          <div class="rtbar"></div>
          <div class="rtbody">
            <div class="rtname">${r.name||id}</div>
            <div class="rtmeta">
              ${dateStr?`<span class="pill">📅 ${dateStr}</span>`:''}
              ${r.organizer?`<span class="pill org">${r.organizer}</span>`:''}
              ${r.championship?`<span class="pill" style="color:var(--ac)">🏆 ${r.championship}</span>`:''}
            </div>
          </div>
          <div class="rtcount"><div class="rtnum">${r.pilotsCount||'—'}</div><div class="rtclbl">Pilotos</div></div>
          <div class="rtarrow">›</div>
        </div>`;
    });
    html += `</div>`;
  });

  if (!anyShown) {
    html += `<div class="empty"><div class="empty-icon">📭</div><div class="empty-title">Sin pruebas para este filtro</div><div>Prueba con otro campeonato o selecciona "Todos".</div></div>`;
  }
  content.innerHTML = html;
}

window.setChampFilter = function(value) {
  _filterChamp = value;
  try { localStorage.setItem('tr_hist_champ', value); } catch(e){}
  renderIndex();
};

// ── Abrir prueba ──────────────────────────────────────────────────────────
window.openRace = async function(year, id) {
  const content = document.getElementById('listContent');
  showView('Race');
  document.getElementById('hTitle').innerHTML = '<span style="font-size:14px;color:#fff">Cargando…</span>';
  document.getElementById('raceCats').innerHTML = '<div class="loading"></div>';

  try {
    const snap = await get(ref(db, `races_archive/${year}/${id}`));
    const data = snap.val();
    if (!data) {
      document.getElementById('raceCats').innerHTML = '<div class="empty"><div class="empty-icon">⚠</div><div class="empty-title">No encontrada</div></div>';
      return;
    }
    _currentRace = { year, id, ...data };
    history.pushState({view:'race',year,id}, '', `?race=${year}/${id}`);
    renderRace();
  } catch(e) {
    document.getElementById('raceCats').innerHTML = `<div class="empty"><div class="empty-icon">⚠</div><div class="empty-title">Error</div><div>${e.message}</div></div>`;
  }
};

function renderRace() {
  const meta = _currentRace.meta || {};
  const state = _currentRace.state || {};
  const pilots = state.pilots || [];

  // Título header
  document.getElementById('hTitle').innerHTML = `${meta.name||'—'} <small>Histórico</small>`;
  // Hero
  document.getElementById('rRace').textContent = meta.name || '—';
  const d = meta.date ? new Date(meta.date+'T12:00:00').toLocaleDateString('es-ES',{day:'numeric',month:'long',year:'numeric'}) : '';
  document.getElementById('rDate').textContent = d;
  document.getElementById('rOrg').textContent = meta.organizer || '';
  document.getElementById('rPilots').textContent = pilots.length;
  const cats = new Set(pilots.map(p => p.cat)); 
  document.getElementById('rCats').textContent = cats.size;

  // Tarjetas de categoría
  let html = '<div class="catgrid" style="padding:12px;display:flex;flex-direction:column;gap:10px">';
  CAT_ORDER.forEach(cat => {
    const cp = pilots.filter(p => p.cat === cat);
    if (!cp.length) return;
    const color = CAT_HEX[cat] || '#374151';
    const sorted = sortCat(cp);
    const leader = sorted[0];
    const leaderTxt = leader ? `1º · #${leader.dorsal} ${leader.name||''}` : '';
    const fCount = cp.filter(p => p.finishTime && p.scores?.[2]?.every(v=>v!==null)).length;
    const rCount = cp.filter(p => p.dnf || p.dsq).length;
    html += `
      <div class="rtile" onclick="window.openCat('${cat}')">
        <div class="rtbar" style="background:${color}"></div>
        <div class="rtbody">
          <div style="font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;color:${color};line-height:1">${cat}</div>
          <div class="rtname" style="font-size:13px;margin-top:4px">${leaderTxt}</div>
          <div class="rtmeta">
            ${fCount?`<span class="pill" style="color:var(--ok)">✓ ${fCount} finalizados</span>`:''}
            ${rCount?`<span class="pill" style="color:var(--dg)">${rCount} retirados</span>`:''}
          </div>
        </div>
        <div class="rtcount"><div class="rtnum">${cp.length}</div><div class="rtclbl">Pilotos</div></div>
        <div class="rtarrow">›</div>
      </div>`;
  });
  html += '</div>';
  document.getElementById('raceCats').innerHTML = html;
}

// ── Vista de categoría ────────────────────────────────────────────────────
window.openCat = function(cat) {
  _selCat = cat;
  showView('Cat');
  renderCat();
  history.pushState({view:'cat',cat}, '', `?race=${_currentRace.year}/${_currentRace.id}&cat=${cat}`);
};

function renderCat() {
  if (!_currentRace || !_selCat) return;
  const pilots = _currentRace.state?.pilots || [];
  const cp = pilots.filter(p => p.cat === _selCat);
  const sorted = sortCat(cp);
  const color = CAT_HEX[_selCat] || '#374151';

  document.getElementById('hTitle').innerHTML = `<span style="color:${color};font-size:20px;letter-spacing:3px">${_selCat}</span> <small>${_currentRace.meta?.name||''}</small>`;
  document.getElementById('catStrip').style.borderBottomColor = color;
  document.getElementById('catName').textContent = _selCat;
  document.getElementById('catName').style.color = color;
  document.getElementById('catMeta').textContent = `${cp.length} pilotos · Clasificación final`;

  let html = '';
  sorted.forEach((p, i) => {
    const pos = i + 1;
    const topCls = pos===1?'top1':pos===2?'top2':pos===3?'top3':'';
    const dsqCls = (p.dsq||p.dnf) ? 'dsq' : '';
    const total = getTotal(p);
    const crono = fmtMs(_totalMs(p));
    let ptsLabel = total!=null ? total : '—';
    if (p.dsq) ptsLabel = 'DSQ';
    else if (p.dnf) ptsLabel = 'R';
    html += `
      <div class="prow ${dsqCls}" onclick="window.openPilot(${p.dorsal})">
        <div class="ppos ${topCls}">${p.dsq||p.dnf?'—':pos}</div>
        <div class="pdors">${p.dorsal||''}</div>
        <div class="pinfo">
          <div class="pname">${p.name||'—'}</div>
          <div class="psub">${p.club||''}${p.brand?' · '+p.brand:''}</div>
        </div>
        <div class="pright">
          <div class="ppts">${ptsLabel}</div>
          <div class="pplbl">${crono?crono:'pts'}</div>
          ${lapBadge(p)}
        </div>
      </div>`;
  });
  document.getElementById('catList').innerHTML = html;
}

// ── Vista de piloto ───────────────────────────────────────────────────────
window.openPilot = function(dorsal) {
  if (!_currentRace || !_selCat) return;
  const pilots = _currentRace.state?.pilots || [];
  const p = pilots.find(x => x.dorsal === dorsal && x.cat === _selCat);
  if (!p) return;
  _selPilot = p;
  showView('Pilot');
  renderPilot();
  history.pushState({view:'pilot',cat:_selCat,dorsal}, '', `?race=${_currentRace.year}/${_currentRace.id}&cat=${_selCat}&pilot=${dorsal}`);
};

function renderPilot() {
  const p = _selPilot;
  const cfg = _currentRace.state?.cfg || {};
  const nz = cfg.numZones || p.scores?.[0]?.length || 7;
  const l1max = cfg.lap1MaxMins || 150;
  const rdurMins = Math.round((cfg.raceDurationHrs||5)*60);
  const isKids = cfg.kidsMode === true;

  document.getElementById('hTitle').innerHTML = `<span style="font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${p.name}</span> <small>${_currentRace.meta?.name||''}</small>`;
  document.getElementById('pName').textContent = p.name || '—';
  const parts = [`#${p.dorsal}`, p.cat];
  if (p.club) parts.push(p.club);
  if (p.brand) parts.push(p.brand);
  document.getElementById('pMeta').textContent = parts.join(' · ');

  const tp = getTotal(p);
  const l1p = lapPts(p,0), l2p = lapPts(p,1), l3p = lapPts(p,2);
  const zonePts = (l1p??0)+(l2p??0)+(l3p??0);
  const timePen = (p.lap1Penalty||0)+(p.finishPenalty||0);
  const extraPen = (p.extraPenalties||[]).reduce((s,e)=>s+(e.pts||0),0);
  const totalPen = timePen+extraPen;
  const cronoStr = fmtMs(_totalMs(p));

  // Totals chips
  document.getElementById('pTotals').innerHTML = `
    <div class="pdchip"><div class="cv">${tp!==null?tp:'—'}</div><div class="cl">Total pts</div></div>
    <div class="pdchip"><div class="cv" style="color:#94a3b8">${zonePts}</div><div class="cl">Zonas</div></div>
    <div class="pdchip"><div class="cv" style="color:#ef4444">${totalPen>0?'+'+totalPen:'0'}</div><div class="cl">Penaliz.</div></div>
    ${cronoStr?`<div class="pdchip"><div class="cv" style="font-size:14px">${cronoStr}</div><div class="cl">Tiempo</div></div>`:''}
  `;

  let body = '';

  // Status banners
  if (p.dsq) {
    body += `<div style="margin:12px 14px;background:rgba(194,65,12,.1);border:1px solid rgba(194,65,12,.4);border-radius:10px;padding:10px 14px">
      <div style="font-weight:800;color:#c2410c;font-size:13px;margin-bottom:4px">⛔ DESCALIFICADO</div>
      <div style="font-size:12px">${p.dsqReason||'Sin motivo'}</div>
    </div>`;
  } else if (p.dnf) {
    body += `<div style="margin:12px 14px;background:rgba(185,28,28,.08);border:1px solid rgba(185,28,28,.3);border-radius:10px;padding:10px 14px">
      <div style="font-weight:800;color:var(--dg);font-size:13px">🚩 RETIRADO</div>
    </div>`;
  }

  // Hora de salida
  if (p.schedStart) {
    body += `<div style="display:flex;align-items:center;gap:10px;margin:10px 14px;background:var(--sf);border:1px solid var(--bd);border-radius:10px;padding:10px 14px">
      <div style="font-size:20px">🏁</div>
      <div><div style="font-size:9px;color:var(--mu);text-transform:uppercase;letter-spacing:.5px">Hora de salida</div>
      <div style="font-size:20px;font-weight:900;font-family:monospace;color:var(--ac)">${p.schedStart}</div></div>
    </div>`;
  }

  // Distribución de puntuaciones
  const scBar = [[0,'var(--s0)'],[1,'var(--s1)'],[2,'var(--s2)'],[3,'var(--s3)'],[5,'var(--s5)']]
    .map(([v,c]) => `<div class="scchip" style="background:${c}22;color:${c};border:1px solid ${c}44"><span style="font-size:14px">${v}</span><span>×${cnt(p,v)}</span></div>`).join('');
  body += `<div class="pdsec"><div class="pdstitle">Distribución de puntuaciones</div></div><div class="scbar">${scBar}</div>`;

  // Vueltas
  const sch = p.schedStart;
  const ch1tope = (sch && !isKids) ? addMins(sch, l1max) : null;
  const chftope = sch ? addMins(sch, rdurMins) : null;
  const startMsOfDay = sch ? (parseInt(sch.split(':')[0])*60+parseInt(sch.split(':')[1]))*60*1000 : null;

  const lapDefs = [
    {title:'1ª Vuelta', pts:l1p, arr:arrTime(p.lap1Time), tope:ch1tope, pen:p.lap1Penalty||0, dur:lapDuration(startMsOfDay,p.lap1Time), li:0},
    {title:'2ª Vuelta', pts:l2p, arr:arrTime(p.lap2Time), tope:null, pen:0, dur:lapDuration(p.lap1Time,p.lap2Time), li:1},
    {title:'3ª Vuelta — CHF', pts:l3p, arr:arrTime(p.finishTime), tope:chftope, pen:p.finishPenalty||0, dur:lapDuration(p.lap2Time,p.finishTime), li:2}
  ];

  body += lapDefs.map(({title,pts,arr,tope,pen,dur,li}) => {
    const scores = p.scores?.[li] || [];
    const zonesHtml = Array.from({length:nz},(_,z)=>{
      const v = scores[z];
      return `<div class="zcell"><div class="zlbl">Z${z+1}</div><div class="zval ${zoneClass(v)}">${v!==null&&v!==undefined?v:'—'}</div></div>`;
    }).join('');
    const isLate = pen > 0;
    const timesHtml =
      (arr?`<div class="tchip"><div class="tl">Llegada real</div><div class="tv ${isLate?'twn':'tok'}">${arr}</div></div>`:`<div class="tchip"><div class="tl">Llegada real</div><div class="tv">—</div></div>`)+
      (tope?`<div class="tchip"><div class="tl">Hora tope</div><div class="tv">${tope}</div></div>`:'')+
      (dur?`<div class="tchip"><div class="tl">Tiempo vuelta</div><div class="tv">${dur}</div></div>`:'')+
      (pen>0?`<div class="tchip"><div class="tl">Penaliz. tiempo</div><div class="tv twn">+${pen} pts</div></div>`:'');
    return `<div class="lapcard">
      <div class="laphead"><div class="laptitle">${title}</div><div class="lappts">${pts!==null?pts+' pts':'—'}</div></div>
      <div class="zgrid">${zonesHtml}</div>
      <div class="timegrid">${timesHtml}</div>
    </div>`;
  }).join('');

  // Penalizaciones adicionales
  const extras = p.extraPenalties || [];
  if (extras.length) {
    body += `<div class="pdsec"><div class="pdstitle">Penalizaciones adicionales</div></div>
    <div class="penlist">${extras.map(ep=>`<div class="penitem"><div class="penpts">+${ep.pts}</div><div class="penrsn">${ep.reason||'Sin motivo'}</div><div class="pents">${ep.ts||''}</div></div>`).join('')}</div>`;
  }

  document.getElementById('pBody').innerHTML = body;
}

// ── Popstate / botón atrás nativo ────────────────────────────────────────
window.addEventListener('popstate', e => {
  const st = e.state;
  if (!st || st.view === 'list') {
    showView('List');
    document.getElementById('hTitle').innerHTML = 'Histórico <small>Archivo de pruebas</small>';
    _currentRace = null; _selCat = null; _selPilot = null;
  } else if (st.view === 'race') {
    showView('Race');
    if (st.year && st.id) {
      // Si ya está cargada, no recargamos
      if (!_currentRace || _currentRace.year !== st.year || _currentRace.id !== st.id) {
        window.openRace(st.year, st.id);
      }
    }
  } else if (st.view === 'cat') {
    showView('Cat');
    _selCat = st.cat;
    renderCat();
  } else if (st.view === 'pilot') {
    showView('Pilot');
    _selCat = st.cat;
    const p = _currentRace?.state?.pilots?.find(x => x.dorsal === st.dorsal && x.cat === st.cat);
    if (p) { _selPilot = p; renderPilot(); }
  }
});

// ── Bootstrap ─────────────────────────────────────────────────────────────
const initialParams = new URLSearchParams(location.search);
const initialRace = initialParams.get('race');
const initialCat  = initialParams.get('cat');
const initialPilot = parseInt(initialParams.get('pilot'));

loadIndex().then(() => {
  if (initialRace) {
    const [year, id] = initialRace.split('/');
    if (year && id) {
      window.openRace(year, id).then(() => {
        if (initialCat) { window.openCat(initialCat); }
        if (initialPilot && initialCat) { window.openPilot(initialPilot); }
      });
    }
  }
});
</script>

</body>
</html>
