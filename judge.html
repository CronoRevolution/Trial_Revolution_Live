<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Juez de Zona — Trial Revolution</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a0c14; --bg2:#111828; --bg3:#1a2236; --border:#252d42; --border2:#3b4668;
  --text:#e2e8f0; --muted:#94a3b8; --accent:#f59e0b; --text-strong:#fff;
  --hdr-bg:linear-gradient(135deg,#0f1520,#1a2236);
  --history-bg:#080b14;
}
[data-theme="light"]{
  --bg:#f1f5f9; --bg2:#ffffff; --bg3:#e2e8f0; --border:#cbd5e1; --border2:#94a3b8;
  --text:#0f172a; --muted:#475569; --accent:#d97706; --text-strong:#0f172a;
  --hdr-bg:linear-gradient(135deg,#ffffff,#f1f5f9);
  --history-bg:#e2e8f0;
}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);overflow:hidden;transition:background .2s,color .2s}
body{display:flex;flex-direction:column;height:100vh}

/* Header */
.hdr{background:var(--hdr-bg);border-bottom:2px solid var(--accent);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.hdr-title{font-weight:800;letter-spacing:2px;font-size:13px;color:var(--accent)}
.hdr-zone{font-size:22px;font-weight:900;color:var(--text-strong);font-family:'Space Mono',monospace}
.hdr-race{font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-top:1px}
.hdr-status{width:10px;height:10px;border-radius:50%;background:#dc2626;transition:background .3s}
.hdr-status.ok{background:#16a34a;box-shadow:0 0 8px #16a34a}

/* Main body */
.main{flex:1;overflow-y:auto;padding:14px;padding-bottom:120px}

/* Search */
.search-bar{position:sticky;top:0;background:var(--bg);padding:4px 0 10px;z-index:5;margin-bottom:6px}
.search-bar input{width:100%;background:var(--bg3);border:2px solid var(--border2);border-radius:10px;padding:12px 14px;font-size:18px;color:var(--text);outline:none;font-family:'Space Mono',monospace;font-weight:700;text-align:center;letter-spacing:2px}
.search-bar input:focus{border-color:var(--accent)}

/* Pilot cards list */
.pilot-list{display:flex;flex-direction:column;gap:8px}
.pilot{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:10px 14px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:border-color .15s,transform .05s}
.pilot:active{transform:scale(0.98)}
.pilot.done-all{opacity:0.35}
.pilot-dorsal{font-size:26px;font-weight:900;font-family:'Space Mono',monospace;min-width:54px;text-align:center;background:var(--bg);border-radius:8px;padding:4px 6px}
.pilot-info{flex:1;min-width:0}
.pilot-name{font-size:14px;font-weight:700;color:var(--text-strong);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pilot-club{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pilot-cat{padding:2px 8px;border-radius:10px;font-size:10px;font-weight:900;letter-spacing:1px;color:#fff}
.pilot-laps{display:flex;gap:3px;align-items:center}
.lap-dot{width:18px;height:18px;border-radius:50%;font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center;background:var(--bg);color:var(--muted);border:1px solid var(--border)}
.lap-dot.filled{background:#16a34a;color:#fff;border-color:#16a34a}

.cat-TR1{background:#b91c1c}.cat-TR2{background:#1d4ed8}.cat-TR3{background:#15803d}
.cat-TR4{background:#a16207}.cat-TR5{background:#c2410c}.cat-TR5A{background:#374151}

/* Empty state */
.empty{text-align:center;padding:40px 20px;color:var(--muted)}
.empty-title{font-size:16px;font-weight:800;margin-bottom:6px;color:var(--muted)}

/* Score modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.85);backdrop-filter:blur(6px);z-index:100;display:flex;align-items:flex-end;justify-content:center;animation:fadeIn .2s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:20px 20px 0 0;width:100%;max-width:560px;padding:20px;animation:slideUp .25s}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-hdr{display:flex;align-items:center;gap:12px;margin-bottom:18px}
.modal-dorsal{font-size:36px;font-weight:900;font-family:'Space Mono',monospace;background:var(--bg);padding:6px 14px;border-radius:10px;min-width:80px;text-align:center}
.modal-name{font-size:14px;font-weight:700;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.modal-lap{background:var(--accent);color:#000;padding:4px 12px;border-radius:8px;font-size:13px;font-weight:900;letter-spacing:1.5px}
.modal-subtitle{font-size:12px;color:var(--muted);margin-bottom:14px;text-align:center}

.score-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:14px}
.score-btn{padding:22px 0;border-radius:14px;border:2px solid;background:var(--bg);font-size:32px;font-weight:900;font-family:'Space Mono',monospace;cursor:pointer;transition:transform .05s}
.score-btn:active{transform:scale(0.94)}
.score-0{border-color:#16a34a;color:#16a34a}
.score-0:active{background:#16a34a;color:#fff}
.score-1{border-color:#60a5fa;color:#60a5fa}
.score-1:active{background:#60a5fa;color:#fff}
.score-2{border-color:#f59e0b;color:#f59e0b}
.score-2:active{background:#f59e0b;color:#000}
.score-3{border-color:#f87171;color:#f87171}
.score-3:active{background:#f87171;color:#fff}
.score-5{border-color:#dc2626;color:#dc2626}
.score-5:active{background:#dc2626;color:#fff}

.modal-actions{display:flex;gap:10px}
.modal-btn{flex:1;padding:12px;border-radius:10px;border:none;font-size:13px;font-weight:700;cursor:pointer;background:var(--border);color:var(--text);letter-spacing:1px}

/* History */
.history{position:fixed;bottom:0;left:0;right:0;background:var(--history-bg);border-top:1px solid var(--border);padding:10px 14px;max-height:110px;overflow-y:auto}
.history-title{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:4px}
.history-item{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border);font-size:12px}
.history-item:last-child{border-bottom:none}
.h-dorsal{font-family:'Space Mono',monospace;font-weight:800;color:var(--accent);min-width:36px}
.h-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:11px;color:var(--muted)}
.h-lap{font-size:10px;color:var(--accent);font-weight:700;letter-spacing:1px}
.h-score{font-weight:900;font-family:'Space Mono',monospace;min-width:18px;text-align:center}
.h-undo{background:transparent;border:none;color:var(--muted);font-size:14px;cursor:pointer;padding:2px 4px}
.h-score.s-0{color:#16a34a}.h-score.s-1{color:#60a5fa}.h-score.s-2{color:#f59e0b}.h-score.s-3{color:#f87171}.h-score.s-5{color:#dc2626}

/* Error */
.err-banner{background:#dc2626;color:#fff;padding:14px;text-align:center;font-size:13px;font-weight:700;position:fixed;top:0;left:0;right:0;z-index:200}

/* Toast */
.toast{position:fixed;bottom:130px;left:50%;transform:translateX(-50%);background:#16a34a;color:#fff;padding:10px 18px;border-radius:10px;font-size:13px;font-weight:700;z-index:150;animation:toastIn .25s, toastOut .25s 1.5s forwards;box-shadow:0 4px 16px rgba(0,0,0,.4)}
@keyframes toastIn{from{opacity:0;transform:translate(-50%,20px)}to{opacity:1;transform:translate(-50%,0)}}
@keyframes toastOut{to{opacity:0;transform:translate(-50%,20px)}}
.toast.err{background:#dc2626}
/* Pestañas del modal */
.modal-tabs{display:flex;gap:4px;margin-bottom:14px;background:var(--bg);padding:3px;border-radius:10px}
.modal-tab{flex:1;padding:8px 6px;border:none;background:transparent;color:var(--muted);font-weight:700;font-size:11px;letter-spacing:.5px;border-radius:7px;cursor:pointer;text-align:center}
.modal-tab.active{background:var(--accent);color:#000}
.modal-tab .ico{display:block;font-size:16px;margin-bottom:2px}
.modal-section{display:none}
.modal-section.active{display:block}
.lap-picker{display:flex;gap:6px;margin-bottom:10px}
.lap-pick-btn{flex:1;padding:10px;border:2px solid var(--border);background:var(--bg);color:var(--text);border-radius:10px;font-weight:800;cursor:pointer}
.lap-pick-btn.active{border-color:var(--accent);background:var(--accent);color:#000}
.lap-pick-btn .cur{display:block;font-size:10px;font-weight:500;color:var(--muted);margin-top:2px}
.lap-pick-btn.active .cur{color:#000}
.modal-textarea{width:100%;min-height:80px;background:var(--bg);border:2px solid var(--border);border-radius:10px;padding:10px;color:var(--text);font-size:14px;font-family:inherit;resize:vertical;outline:none}
.modal-textarea:focus{border-color:var(--accent)}
.yellow-card-box{background:#fef3c7;border:2px solid #f59e0b;border-radius:10px;padding:12px;margin-bottom:12px;color:#78350f}
[data-theme=dark] .yellow-card-box{background:rgba(245,158,11,0.15);color:#fbbf24;border-color:#f59e0b}
.yc-title{font-weight:900;font-size:14px;margin-bottom:6px;letter-spacing:1px}
.yc-msg{font-size:11px;line-height:1.4}
.submit-btn{width:100%;padding:14px;border:none;border-radius:10px;font-size:14px;font-weight:900;letter-spacing:1.5px;cursor:pointer}
.submit-btn.yc{background:#f59e0b;color:#000}
.submit-btn.obs{background:#3b82f6;color:#fff}
.existing-yc,.existing-obs{margin-top:10px;padding:10px;background:var(--bg);border-radius:8px;border:1px solid var(--border);font-size:12px}
.existing-yc .pts{color:#f59e0b;font-weight:900}
.del-btn{background:transparent;border:none;color:var(--muted);font-size:14px;cursor:pointer;float:right}

</style>
</head>
<body>

<div class="hdr">
  <div>
    <div class="hdr-title">JUEZ DE ZONA <span class="hdr-zone" id="hdrZone">—</span></div>
    <div class="hdr-race" id="hdrRace">Conectando…</div>
  </div>
  <div style="display:flex;align-items:center;gap:10px">
    <button id="themeBtn" onclick="toggleTheme()" style="background:transparent;border:1px solid var(--border);color:var(--text);padding:6px 10px;border-radius:8px;font-size:16px;cursor:pointer">🌙</button>
    <div class="hdr-status" id="hdrStatus" title="Estado de conexión"></div>
  </div>
</div>

<div class="main">
  <div class="search-bar">
    <input type="tel" id="searchInput" placeholder="Buscar dorsal…" inputmode="numeric" autocomplete="off">
  </div>
  <div class="pilot-list" id="pilotList">
    <div class="empty">
      <div class="empty-title">Cargando pilotos…</div>
      <div>Conectando con el servidor</div>
    </div>
  </div>
</div>

<!-- Score modal -->
<div id="scoreModal" style="display:none"></div>

<!-- History footer -->
<div class="history" id="history" style="display:none">
  <div class="history-title">Últimas puntuaciones registradas</div>
  <div id="historyList"></div>
</div>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, set, push, child, get, serverTimestamp, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCnasN6ewMMAH5JebMiJeGXYVw8Km-quHc",
  authDomain: "trial-revolution.firebaseapp.com",
  databaseURL: "https://trial-revolution-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "trial-revolution",
  storageBucket: "trial-revolution.firebasestorage.app",
  messagingSenderId: "630413676427",
  appId: "1:630413676427:web:af5a3afd21e67487ba698e",
  measurementId: "G-PGS97VMKT5"
};

// ── Tema claro/oscuro ──────────────────────────────────────────────────────
let _theme = localStorage.getItem('judge_theme') || 'dark';
function applyTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  const btn = document.getElementById('themeBtn');
  if (btn) btn.textContent = t === 'dark' ? '☀️' : '🌙';
  try { localStorage.setItem('judge_theme', t); } catch(e){}
}
window.toggleTheme = () => { _theme = _theme === 'dark' ? 'light' : 'dark'; applyTheme(_theme); };
applyTheme(_theme);

const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);

// ── Parámetros URL ─────────────────────────────────────────────────────────
const qs = new URLSearchParams(location.search);
const raceId = qs.get('race');
const zone   = parseInt(qs.get('zone'));
const token  = qs.get('token');

if (!raceId || !zone || !token) {
  document.body.innerHTML = '<div class="err-banner">⚠ URL incompleta. Pide al mesista que te envíe de nuevo el enlace.</div>';
  throw new Error('URL params missing');
}

// ── Estado ─────────────────────────────────────────────────────────────────
let pilots = [];       // [{dorsal, name, cat, club}]
let pilotScores = {};  // {dorsal: {V1:score, V2:score, V3:score}}
let pilotYellowCards = {}; // {dorsal: {reason, ts}} — solo de esta zona
let pilotObservations = {};// {dorsal: {text, ts}}    — solo de esta zona
let raceInfo = {};     // {name, numLaps, numZones}
let recentHistory = []; // [{dorsal, lap, score, ts, key}]

// ── Conexión a Firebase ────────────────────────────────────────────────────
const statusEl = document.getElementById('hdrStatus');
const raceRef  = ref(db, 'races/' + raceId);
const tokenRef = ref(db, `races/${raceId}/judge_tokens/zone${zone}`);

// Validar token primero
get(tokenRef).then(snap => {
  const stored = snap.val();
  if (!stored || stored.token !== token) {
    document.body.innerHTML = '<div class="err-banner">⛔ Acceso denegado. Token no válido o carrera no iniciada.</div>';
    throw new Error('Invalid token');
  }
  document.getElementById('hdrZone').textContent = zone;
  setupListeners();
}).catch(err => {
  document.body.innerHTML = '<div class="err-banner">⚠ No se puede verificar el acceso. Revisa tu conexión y vuelve a intentarlo.</div>';
  console.error(err);
});

function setupListeners() {
  // Listener de info de carrera + pilotos
  onValue(raceRef, snap => {
    const d = snap.val() || {};
    raceInfo = d.info || {};
    pilots = d.pilots ? Object.values(d.pilots) : [];
    pilotScores = {};

    // Reconstruir pilotScores leyendo los scores globales escritos por cualquier zona
    // y también los scores escritos por el cronómetro principal
    if (d.scores) {
      Object.entries(d.scores).forEach(([key, sc]) => {
        // key = "dorsal_<N>_zone_<Z>_lap_<L>"
        const m = key.match(/^dorsal_(\d+)_zone_(\d+)_lap_(\d+)$/);
        if (!m) return;
        const dorsal = parseInt(m[1]);
        const z = parseInt(m[2]);
        const l = parseInt(m[3]);
        if (z !== zone) return; // solo scores de esta zona
        if (!pilotScores[dorsal]) pilotScores[dorsal] = {};
        pilotScores[dorsal]['V' + l] = sc.score;
      });
    }

    // Tarjetas amarillas de esta zona
    pilotYellowCards = {};
    if (d.yellow_cards) {
      Object.entries(d.yellow_cards).forEach(([key, yc]) => {
        if (yc.zone === zone && yc.dorsal) pilotYellowCards[yc.dorsal] = yc;
      });
    }
    // Observaciones de esta zona
    pilotObservations = {};
    if (d.observations) {
      Object.entries(d.observations).forEach(([key, ob]) => {
        if (ob.zone === zone && ob.dorsal) pilotObservations[ob.dorsal] = ob;
      });
    }

    document.getElementById('hdrRace').textContent = raceInfo.name || '—';
    statusEl.classList.add('ok');
    renderPilots();
    renderHistory();
  }, err => {
    statusEl.classList.remove('ok');
    console.error('Listener error:', err);
  });
}

// ── Render lista de pilotos ────────────────────────────────────────────────
function renderPilots() {
  const list = document.getElementById('pilotList');
  const q = document.getElementById('searchInput').value.trim();

  let filtered = pilots.slice().sort((a,b) => a.dorsal - b.dorsal);
  if (q) {
    filtered = filtered.filter(p =>
      String(p.dorsal).includes(q) ||
      (p.name||'').toLowerCase().includes(q.toLowerCase())
    );
  }

  if (!filtered.length) {
    list.innerHTML = '<div class="empty"><div class="empty-title">Sin resultados</div><div>Prueba con otro número o nombre</div></div>';
    return;
  }

  list.innerHTML = filtered.map(p => {
    const sc = pilotScores[p.dorsal] || {};
    const numLaps = raceInfo.numLaps || 3;
    const laps = [];
    for (let i = 1; i <= numLaps; i++) {
      const v = sc['V'+i];
      const filled = v !== undefined && v !== null;
      laps.push(`<div class="lap-dot ${filled?'filled':''}">${filled ? v : i}</div>`);
    }
    const allDone = Object.keys(sc).length >= numLaps;
    const hasYC  = pilotYellowCards[p.dorsal];
    const hasObs = pilotObservations[p.dorsal];
    const marks = (hasYC?'<span style="font-size:14px" title="Tarjeta amarilla">🟨</span>':'') + (hasObs?'<span style="font-size:14px" title="Observación">📝</span>':'');
    return `<div class="pilot ${allDone?'done-all':''}" onclick="window.selectPilot(${p.dorsal})">
      <div class="pilot-dorsal">${p.dorsal}</div>
      <div class="pilot-info">
        <div class="pilot-name">${p.name || '—'} ${marks}</div>
        <div class="pilot-club">${p.club || ''}</div>
      </div>
      <span class="pilot-cat cat-${p.cat}">${p.cat}</span>
      <div class="pilot-laps">${laps.join('')}</div>
    </div>`;
  }).join('');
}

// ── Modal multi-sección por piloto ─────────────────────────────────────────
window.selectPilot = function(dorsal) {
  const p = pilots.find(x => x.dorsal === dorsal);
  if (!p) return;
  openPilotModal(p);
};

function openPilotModal(p) {
  const m = document.getElementById('scoreModal');
  m.style.display = 'block';
  try { history.pushState({modal:'score'}, '', location.href); } catch(e){}

  const sc = pilotScores[p.dorsal] || {};
  const numLaps = raceInfo.numLaps || 3;

  // Vuelta por defecto para Puntuar: primera sin puntuar
  let defaultLap = null;
  for (let i = 1; i <= numLaps; i++) {
    if (sc['V'+i] === undefined || sc['V'+i] === null) { defaultLap = i; break; }
  }
  const initialLap = defaultLap || 1;
  const canQuickScore = defaultLap !== null;
  // Vuelta por defecto para Corregir: ÚLTIMA vuelta ya puntuada (la más reciente)
  let editDefaultLap = 1;
  for (let i = numLaps; i >= 1; i--) {
    if (sc['V'+i] !== undefined && sc['V'+i] !== null) { editDefaultLap = i; break; }
  }

  // Tarjeta amarilla existente (si hay)
  const ycKey = `yc_dorsal_${p.dorsal}_zone_${zone}`;
  const existingYC = pilotYellowCards[p.dorsal];
  // Observación existente
  const obsKey = `obs_dorsal_${p.dorsal}_zone_${zone}`;
  const existingObs = pilotObservations[p.dorsal];

  // Construir pestañas y secciones
  const tabs = [
    canQuickScore ? { id:'score', ico:'🎯', label:'Puntuar' } : null,
    { id:'edit',  ico:'✎',  label:'Corregir' },
    { id:'yc',    ico:'🟨', label:'T. Amarilla' },
    { id:'obs',   ico:'📝', label:'Obs.' },
  ].filter(Boolean);
  const firstTab = tabs[0].id;

  m.innerHTML = `
    <div class="modal-bg" onclick="if(event.target===this){history.back()}">
      <div class="modal">
        <div class="modal-hdr">
          <div class="modal-dorsal">${p.dorsal}</div>
          <div class="modal-name">${p.name}</div>
          <span class="pilot-cat cat-${p.cat}">${p.cat}</span>
        </div>

        <div class="modal-tabs">
          ${tabs.map(t => `<button class="modal-tab ${t.id===firstTab?'active':''}" data-tab="${t.id}" onclick="selectModalTab('${t.id}')"><span class="ico">${t.ico}</span>${t.label}</button>`).join('')}
        </div>

        ${canQuickScore ? `
        <div class="modal-section active" data-section="score">
          <div class="modal-subtitle">Zona ${zone} — <b>VUELTA ${initialLap}</b> · Toca la puntuación</div>
          <div class="score-grid">
            <button class="score-btn score-0" onclick="window.submitScore(${p.dorsal}, ${initialLap}, 0)">0</button>
            <button class="score-btn score-1" onclick="window.submitScore(${p.dorsal}, ${initialLap}, 1)">1</button>
            <button class="score-btn score-2" onclick="window.submitScore(${p.dorsal}, ${initialLap}, 2)">2</button>
            <button class="score-btn score-3" onclick="window.submitScore(${p.dorsal}, ${initialLap}, 3)">3</button>
            <button class="score-btn score-5" onclick="window.submitScore(${p.dorsal}, ${initialLap}, 5)">5</button>
          </div>
        </div>` : ''}

        <div class="modal-section ${firstTab==='edit'?'active':''}" data-section="edit">
          <div class="modal-subtitle">Elige vuelta a corregir</div>
          <div class="lap-picker">
            ${[1,2,3].slice(0, numLaps).map(l => {
              const cur = sc['V'+l];
              const hasVal = cur !== undefined && cur !== null;
              return `<button class="lap-pick-btn ${l===editDefaultLap?'active':''}" data-lap="${l}" onclick="selectEditLap(${l})">V${l}<span class="cur">${hasVal?'Actual: '+cur+'pts':'Sin puntuar'}</span></button>`;
            }).join('')}
          </div>
          <div id="editLapScoreGrid" class="score-grid">
            <button class="score-btn score-0" onclick="window.submitScore(${p.dorsal}, getEditLap(), 0)">0</button>
            <button class="score-btn score-1" onclick="window.submitScore(${p.dorsal}, getEditLap(), 1)">1</button>
            <button class="score-btn score-2" onclick="window.submitScore(${p.dorsal}, getEditLap(), 2)">2</button>
            <button class="score-btn score-3" onclick="window.submitScore(${p.dorsal}, getEditLap(), 3)">3</button>
            <button class="score-btn score-5" onclick="window.submitScore(${p.dorsal}, getEditLap(), 5)">5</button>
          </div>
          <button class="submit-btn" style="background:#dc2626;color:#fff;margin-top:10px" onclick="window.deleteScore(${p.dorsal}, getEditLap())">🗑 ELIMINAR PUNTUACIÓN DE ESTA VUELTA</button>
        </div>

        <div class="modal-section ${firstTab==='yc'?'active':''}" data-section="yc">
          <div class="yellow-card-box">
            <div class="yc-title">🟨 TARJETA AMARILLA — 10 PUNTOS</div>
            <div class="yc-msg">Añade una sanción de 10 puntos al piloto con motivo explicado. El mesista lo revisará.</div>
          </div>
          <textarea id="ycReason" class="modal-textarea" placeholder="Motivo de la tarjeta amarilla (obligatorio)">${existingYC ? existingYC.reason : ''}</textarea>
          <button class="submit-btn yc" style="margin-top:10px" onclick="submitYellowCard(${p.dorsal})">${existingYC ? '✓ ACTUALIZAR TARJETA' : '🟨 REGISTRAR TARJETA AMARILLA'}</button>
          ${existingYC ? `<div class="existing-yc"><button class="del-btn" onclick="removeYellowCard(${p.dorsal})" title="Eliminar tarjeta">✕</button><b>Ya registrada:</b> <span class="pts">+10pts</span><br>${existingYC.reason}</div>` : ''}
        </div>

        <div class="modal-section ${firstTab==='obs'?'active':''}" data-section="obs">
          <div class="modal-subtitle">📝 Observación (el mesista la revisará)</div>
          <textarea id="obsText" class="modal-textarea" placeholder="Anotación libre sobre el piloto o incidencia">${existingObs ? existingObs.text : ''}</textarea>
          <button class="submit-btn obs" style="margin-top:10px" onclick="submitObservation(${p.dorsal})">${existingObs ? '✓ ACTUALIZAR OBSERVACIÓN' : '📝 GUARDAR OBSERVACIÓN'}</button>
          ${existingObs ? `<div class="existing-obs"><button class="del-btn" onclick="removeObservation(${p.dorsal})" title="Eliminar">✕</button><b>Ya registrada:</b><br>${existingObs.text}</div>` : ''}
        </div>

        <div class="modal-actions" style="margin-top:14px">
          <button class="modal-btn" onclick="history.back()">Cerrar</button>
        </div>
      </div>
    </div>`;

  // Guardar estado de edición (vuelta seleccionada en pestaña Corregir: última puntuada)
  window._editLap = editDefaultLap;
}

window.selectModalTab = function(tabId) {
  document.querySelectorAll('.modal-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tabId));
  document.querySelectorAll('.modal-section').forEach(s => s.classList.toggle('active', s.dataset.section === tabId));
};
window.selectEditLap = function(lap) {
  window._editLap = lap;
  document.querySelectorAll('[data-lap]').forEach(b => b.classList.toggle('active', parseInt(b.dataset.lap) === lap));
};
window.getEditLap = () => window._editLap || 1;

window.submitYellowCard = async function(dorsal) {
  const reason = (document.getElementById('ycReason').value || '').trim();
  if (!reason) { showToast('Indica el motivo de la tarjeta', 'err'); return; }
  const key = `dorsal_${dorsal}_zone_${zone}`;
  try {
    await set(ref(db, `races/${raceId}/yellow_cards/${key}`), {
      dorsal, zone, reason, ts: Date.now(), token, source: 'judge'
    });
    showToast(`🟨 Tarjeta amarilla #${dorsal} registrada`);
    try { history.back(); } catch(e) { document.getElementById('scoreModal').style.display='none'; }
  } catch(e) {
    showToast('⚠ Error al registrar tarjeta', 'err'); console.error(e);
  }
};
window.removeYellowCard = async function(dorsal) {
  if (!confirm('¿Eliminar esta tarjeta amarilla?')) return;
  const key = `dorsal_${dorsal}_zone_${zone}`;
  try {
    await remove(ref(db, `races/${raceId}/yellow_cards/${key}`));
    showToast('✓ Tarjeta eliminada');
    try { history.back(); } catch(e){}
  } catch(e) { showToast('⚠ Error', 'err'); }
};

window.submitObservation = async function(dorsal) {
  const text = (document.getElementById('obsText').value || '').trim();
  if (!text) { showToast('Escribe la observación', 'err'); return; }
  const key = `dorsal_${dorsal}_zone_${zone}`;
  try {
    await set(ref(db, `races/${raceId}/observations/${key}`), {
      dorsal, zone, text, ts: Date.now(), token, source: 'judge'
    });
    showToast(`📝 Observación #${dorsal} enviada`);
    try { history.back(); } catch(e) { document.getElementById('scoreModal').style.display='none'; }
  } catch(e) {
    showToast('⚠ Error al enviar', 'err'); console.error(e);
  }
};
window.removeObservation = async function(dorsal) {
  if (!confirm('¿Eliminar esta observación?')) return;
  const key = `dorsal_${dorsal}_zone_${zone}`;
  try {
    await remove(ref(db, `races/${raceId}/observations/${key}`));
    showToast('✓ Observación eliminada');
    try { history.back(); } catch(e){}
  } catch(e) { showToast('⚠ Error', 'err'); }
};

// Cola offline: si falla, encolar localmente y reintentar cada 5s
const OFFLINE_QUEUE_KEY = 'judge_offline_queue_' + zone;
function getOfflineQueue() {
  try { return JSON.parse(localStorage.getItem(OFFLINE_QUEUE_KEY) || '[]'); } catch(e) { return []; }
}
function setOfflineQueue(q) {
  try { localStorage.setItem(OFFLINE_QUEUE_KEY, JSON.stringify(q)); } catch(e){}
}

// Eliminar puntuación (por ejemplo error de piloto)
window.deleteScore = async function(dorsal, lap) {
  const p = pilots.find(x => x.dorsal === dorsal);
  const sc = pilotScores[dorsal] || {};
  const cur = sc['V'+lap];
  if (cur === undefined || cur === null) {
    showToast('Esta vuelta no tiene puntuación que eliminar', 'err');
    return;
  }
  if (!confirm(`¿Eliminar la puntuación de V${lap} del dorsal ${dorsal}?`)) return;
  const key = `dorsal_${dorsal}_zone_${zone}_lap_${lap}`;
  try {
    await remove(ref(db, `races/${raceId}/scores/${key}`));
    try { history.back(); } catch(e) { document.getElementById('scoreModal').style.display='none'; }
    showToast(`🗑 Eliminada V${lap} de #${dorsal}`);
    // Marcar en historial local como "borrado"
    recentHistory.unshift({ dorsal, lap, score: '—', ts: Date.now(), key, name: p?.name, deleted: true });
    if (recentHistory.length > 6) recentHistory.length = 6;
    renderHistory();
  } catch(e) {
    showToast('⚠ Error al eliminar', 'err');
    console.error(e);
  }
};

window.submitScore = async function(dorsal, lap, score) {
  const p = pilots.find(x => x.dorsal === dorsal);
  const key = `dorsal_${dorsal}_zone_${zone}_lap_${lap}`;
  const payload = { dorsal, zone, lap, score, ts: Date.now(), source: 'judge', token };

  // Añadir al historial local inmediatamente (optimistic UI)
  try { history.back(); } catch(e) { document.getElementById('scoreModal').style.display='none'; }
  recentHistory.unshift({ dorsal, lap, score, ts: Date.now(), key, name: p?.name });
  if (recentHistory.length > 6) recentHistory.length = 6;
  renderHistory();

  try {
    const scoreRef = ref(db, `races/${raceId}/scores/${key}`);
    await set(scoreRef, payload);
    showToast(`✓ ${dorsal} — V${lap} — ${score}pts`);
  } catch(e) {
    // Encolar para reintento
    const q = getOfflineQueue();
    // Reemplazar si ya hay un score para la misma clave (más reciente gana)
    const existing = q.findIndex(x => x.key === key);
    const entry = { key, payload, tries: 0 };
    if (existing >= 0) q[existing] = entry; else q.push(entry);
    setOfflineQueue(q);
    showToast(`📥 Guardado offline (${q.length} pendientes)`, 'err');
    console.warn('Offline queue:', e);
  }
};

// Reintento periódico de la cola offline
async function flushOfflineQueue() {
  const q = getOfflineQueue();
  if (!q.length) return;
  const remaining = [];
  for (const item of q) {
    try {
      const r = ref(db, `races/${raceId}/scores/${item.key}`);
      await set(r, item.payload);
    } catch(e) {
      item.tries = (item.tries || 0) + 1;
      if (item.tries < 20) remaining.push(item);
    }
  }
  setOfflineQueue(remaining);
  const sent = q.length - remaining.length;
  if (sent > 0) {
    showToast(`✓ ${sent} puntuación(es) enviadas`);
    updateQueueBadge();
  }
}

function updateQueueBadge() {
  const q = getOfflineQueue();
  let badge = document.getElementById('queueBadge');
  if (!q.length) { if (badge) badge.remove(); return; }
  if (!badge) {
    badge = document.createElement('div');
    badge.id = 'queueBadge';
    badge.style.cssText = 'position:fixed;top:58px;right:12px;background:#dc2626;color:#fff;padding:4px 10px;border-radius:12px;font-size:10px;font-weight:800;letter-spacing:1px;z-index:50';
    document.body.appendChild(badge);
  }
  badge.textContent = `📥 ${q.length} PENDIENTES`;
}

setInterval(flushOfflineQueue, 5000);
setInterval(updateQueueBadge, 2000);
window.addEventListener('online', flushOfflineQueue);
flushOfflineQueue(); // intentar al cargar

window.undoScore = async function(key) {
  try {
    await remove(ref(db, `races/${raceId}/scores/${key}`));
    recentHistory = recentHistory.filter(h => h.key !== key);
    renderHistory();
    showToast('✓ Puntuación eliminada');
  } catch(e) {
    showToast('⚠ Error al eliminar', 'err');
    console.error(e);
  }
};

function renderHistory() {
  const h = document.getElementById('history');
  const list = document.getElementById('historyList');
  if (!recentHistory.length) { h.style.display = 'none'; return; }
  h.style.display = 'block';
  list.innerHTML = recentHistory.map(r => {
    if (r.deleted) {
      return `<div class="history-item" style="opacity:0.6">
        <span class="h-dorsal">${r.dorsal}</span>
        <span class="h-name">${r.name || '—'}</span>
        <span class="h-lap">V${r.lap}</span>
        <span style="font-weight:700;color:#dc2626;min-width:18px;text-align:center">🗑</span>
      </div>`;
    }
    return `<div class="history-item">
      <span class="h-dorsal">${r.dorsal}</span>
      <span class="h-name">${r.name || '—'}</span>
      <span class="h-lap">V${r.lap}</span>
      <span class="h-score s-${r.score}">${r.score}</span>
      <button class="h-undo" onclick="window.undoScore('${r.key}')" title="Deshacer">↶</button>
    </div>`;
  }).join('');
}

// ── Toast ──────────────────────────────────────────────────────────────────
function showToast(msg, type) {
  const t = document.createElement('div');
  t.className = 'toast' + (type === 'err' ? ' err' : '');
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2000);
}

// ── Buscador ───────────────────────────────────────────────────────────────
document.getElementById('searchInput').addEventListener('input', renderPilots);

// Botón atrás de Android: cerrar modal en vez de salir de la app
window.addEventListener('popstate', (e) => {
  const m = document.getElementById('scoreModal');
  if (m && m.style.display === 'block') {
    m.style.display = 'none';
    m.innerHTML = '';
  }
});
</script>
